<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Mjolnir Web</title>
    <script>
      (() => {
        try {
          if (localStorage.getItem("mjolnir-remote-theme") === "light") {
            document.documentElement.dataset.theme = "light";
          }
        } catch {
          // Theme preference is cosmetic; private or locked-down storage can fail.
        }
      })();
    </script>
    <!-- PWA: installable app shell. Apple meta tags enable standalone
         home-screen launch; script updates theme-color when the palette flips. -->
    <meta name="theme-color" content="#050606">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mjolnir">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <style>
      /* Brokk HUD: near-black machined surfaces, one signal red, zero
         border-radius. Cut-corner controls are built from three layers —
         element background = edge, ::before = gap, ::after = fill — with
         negative z-index pseudos so text needs no wrapper spans. Kind hues
         (user/agent/thought/tool) appear only as 2px rails, labels, and
         glyphs; red always means state: live, selected, or needs you. */

      @font-face {
        font-family: "Staatliches";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/staatliches-400.woff2") format("woff2");
      }

      @font-face {
        font-family: "Rajdhani";
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url("/fonts/rajdhani-500.woff2") format("woff2");
      }

      @font-face {
        font-family: "Rajdhani";
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url("/fonts/rajdhani-600.woff2") format("woff2");
      }

      @font-face {
        font-family: "Rajdhani";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url("/fonts/rajdhani-700.woff2") format("woff2");
      }

      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url("/fonts/jetbrains-mono.woff2") format("woff2");
      }

      :root {
        color-scheme: dark;
        --theme-color: #050606;

        /* surfaces */
        --bg: #050606;
        --surface-well: #080909;
        --surface-chrome: #0b0d0e;
        --surface-panel: #0d0f10;
        --surface-control: #101213;
        --surface-terminal: #090a0b;

        /* text */
        --text: #f2f0eb;
        --text-control: #e8e4de;
        --muted: #a8a8a8;
        --dim: #6f7375;

        /* signal */
        --red: #eb3f33;
        --red-hot: #f05a50;
        --red-deep: #4d1614;

        /* hairlines */
        --line-row: rgb(255 255 255 / 0.085);
        --line: rgb(255 255 255 / 0.11);
        --line-control: rgb(255 255 255 / 0.14);
        --line-strong: rgb(255 255 255 / 0.22);
        --grid-line: rgb(255 255 255 / 0.03);
        --selection-bg: rgb(235 63 51 / 0.32);
        --selection-text: #fff;
        --inline-bg: rgb(255 255 255 / 0.055);
        --inline-bg-strong: rgb(255 255 255 / 0.06);
        --row-hover: rgb(255 255 255 / 0.03);
        --row-subtle: rgb(255 255 255 / 0.015);
        --live-dot-bg: #26292b;
        --button-edge-hover: rgb(255 255 255 / 0.34);
        --button-hover-text: #fff;
        --permission-badge-text: #f6a49e;
        --user-entry-text: #edf3f7;
        --overlay-shadow: rgb(0 0 0 / 0.55);
        --scrollbar-thumb: #2a2d2f;

        /* transcript kind hues: rails, labels, glyphs only — never washes */
        --user: #5fa8cf;
        --agent: #4fae84;
        --thought: #c79a4b;
        --tool: #9a8cc9;
        --system: #6f7375;

        /* type */
        --font-display: "Staatliches", "Arial Narrow", Impact, sans-serif;
        --font-body: "Rajdhani", "Segoe UI", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

        /* cut-corner shapes: key = buttons, console = the composer frame,
           chip = small badges (asymmetric cuts) */
        --shape-key: polygon(9px 0, calc(100% - 9px) 0, 100% 9px, 100% calc(100% - 9px), calc(100% - 9px) 100%, 9px 100%, 0 calc(100% - 9px), 0 9px);
        --shape-key-inner: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
        --shape-key-fill: polygon(7px 0, calc(100% - 7px) 0, 100% 7px, 100% calc(100% - 7px), calc(100% - 7px) 100%, 7px 100%, 0 calc(100% - 7px), 0 7px);
        --shape-console: polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px);
        --shape-console-inner: polygon(11px 0, calc(100% - 11px) 0, 100% 11px, 100% calc(100% - 11px), calc(100% - 11px) 100%, 11px 100%, 0 calc(100% - 11px), 0 11px);
        --shape-console-fill: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
        --shape-chip: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);

        --keyboard-inset: 0px;
        --theme-toggle-reserve: 78px;
        accent-color: var(--red);
        scrollbar-color: var(--scrollbar-thumb) transparent;
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --theme-color: #f7f2e8;

        --bg: #f7f2e8;
        --surface-well: #eee8dc;
        --surface-chrome: #fbf7ef;
        --surface-panel: #fffaf2;
        --surface-control: #f2eadf;
        --surface-terminal: #fffdf8;

        --text: #171614;
        --text-control: #28231c;
        --muted: #596064;
        --dim: #7c8182;

        --red: #c83228;
        --red-hot: #a92c24;
        --red-deep: #f1c6c0;

        --line-row: rgb(24 23 21 / 0.095);
        --line: rgb(24 23 21 / 0.14);
        --line-control: rgb(24 23 21 / 0.18);
        --line-strong: rgb(24 23 21 / 0.27);
        --grid-line: rgb(24 23 21 / 0.045);
        --selection-bg: rgb(200 50 40 / 0.24);
        --selection-text: #171614;
        --inline-bg: rgb(24 23 21 / 0.045);
        --inline-bg-strong: rgb(24 23 21 / 0.06);
        --row-hover: rgb(24 23 21 / 0.045);
        --row-subtle: rgb(24 23 21 / 0.025);
        --live-dot-bg: #b9b2a7;
        --button-edge-hover: rgb(24 23 21 / 0.34);
        --button-hover-text: #11100f;
        --permission-badge-text: #9f3029;
        --user-entry-text: #14313f;
        --overlay-shadow: rgb(61 54 43 / 0.2);
        --scrollbar-thumb: #c8beb0;

        --user: #176b96;
        --agent: #14754f;
        --thought: #88600e;
        --tool: #6c58a0;
        --system: #777c7f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100dvh;
        overflow: hidden;
        font-family: var(--font-body);
        font-size: 15px;
        font-weight: 500;
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
        /* blueprint grid over near-black; opaque panes cover it, so it reads
           mainly on the auth screen and at pane seams */
        background:
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
          var(--bg);
        background-size: 9rem 9rem, 9rem 9rem, auto;
      }

      :focus-visible {
        outline: 1px solid var(--red);
        outline-offset: 3px;
      }

      ::selection {
        background: var(--selection-bg);
        color: var(--selection-text);
      }

      ::placeholder {
        color: var(--dim);
        opacity: 1;
      }

      button {
        font: inherit;
        color: inherit;
      }

      [hidden] {
        display: none !important;
      }

      .empty {
        color: var(--dim);
        font: 700 10.5px/1.6 var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 28px 18px;
        text-align: center;
      }

      /* ---- HUD keys: cut-corner buttons (edge / gap / fill layers) ---- */

      .primary,
      .permission-option,
      .jump-to-latest,
      .icon-button,
      .theme-toggle {
        position: relative;
        isolation: isolate;
        border: 0;
        cursor: pointer;
        clip-path: var(--shape-key);
        background: var(--key-edge, var(--line-strong));
        color: var(--key-text, var(--text-control));
        font: 700 11.5px/1 var(--font-body);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: background-color 0.15s ease, color 0.15s ease;

        &::before {
          content: "";
          position: absolute;
          inset: 1px;
          z-index: -2;
          background: var(--bg);
          clip-path: var(--shape-key-inner);
        }

        &::after {
          content: "";
          position: absolute;
          inset: 2px;
          z-index: -1;
          background: var(--key-fill, linear-gradient(180deg, rgb(255 255 255 / 0.05), rgb(255 255 255 / 0.008) 60%), var(--surface-control));
          clip-path: var(--shape-key-fill);
        }

        &:hover:not(:disabled) {
          background: var(--key-edge-hover, var(--button-edge-hover));
          color: var(--key-text-hover, var(--button-hover-text));
        }

        &:disabled {
          opacity: 0.45;
          cursor: default;
        }
      }

      .primary {
        --key-edge: rgb(235 63 51 / 0.52);
        --key-edge-hover: rgb(235 63 51 / 0.85);
        --key-fill:
          linear-gradient(90deg, rgb(235 63 51 / 0.2), transparent 58%),
          linear-gradient(180deg, rgb(235 63 51 / 0.14), rgb(235 63 51 / 0.03)),
          #151010;
        --key-text: #ffe9e6;
        --key-text-hover: #fff;
        height: 34px;
        padding: 0 18px;

        &:hover:not(:disabled) {
          filter: drop-shadow(0 0 9px rgb(235 63 51 / 0.33));
        }
      }

      .theme-toggle {
        position: fixed;
        top: calc(10px + env(safe-area-inset-top));
        right: calc(12px + env(safe-area-inset-right));
        z-index: 120;
        min-width: 66px;
        height: 34px;
        padding: 0 13px;
      }

      /* ---- auth screen ---- */

      .auth-screen {
        height: 100dvh;
        overflow-y: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at 86% 12%, rgb(235 63 51 / 0.12), transparent 26rem),
          radial-gradient(circle at 8% 90%, rgb(235 63 51 / 0.09), transparent 24rem);
      }

      .auth-card {
        position: relative;
        isolation: isolate;
        width: min(430px, 100%);
        padding: 30px 28px 26px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        clip-path: var(--shape-console);
        background: linear-gradient(135deg, rgb(255 255 255 / 0.2), rgb(255 255 255 / 0.09) 40%, rgb(235 63 51 / 0.38));

        &::before {
          content: "";
          position: absolute;
          inset: 1px;
          z-index: -2;
          background: var(--bg);
          clip-path: var(--shape-console-inner);
        }

        &::after {
          content: "";
          position: absolute;
          inset: 2px;
          z-index: -1;
          background: linear-gradient(180deg, rgb(255 255 255 / 0.03), transparent 42%), var(--surface-chrome);
          clip-path: var(--shape-console-fill);
        }

        & h1 {
          margin: 0;
          font: 400 44px/1 var(--font-display);
          letter-spacing: 0.05em;
          text-transform: uppercase;
          color: var(--text);
          text-shadow: 0 0 26px rgb(242 240 235 / 0.14);
        }

        & p {
          margin: 0;
          color: var(--muted);
          font-size: 15px;
          line-height: 1.55;

          & code {
            font: 0.85em var(--font-mono);
            color: var(--text-control);
            background: var(--inline-bg-strong);
            border: 1px solid var(--line-row);
            padding: 1px 5px;
          }
        }

        & form {
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        & label {
          font: 700 10px/1 var(--font-mono);
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: var(--dim);
        }

        & input {
          border: 1px solid var(--line-control);
          background: var(--bg);
          color: var(--text);
          caret-color: var(--red);
          padding: 13px 12px;
          font: 400 20px/1.4 var(--font-mono);
          letter-spacing: 0.45em;
          text-indent: 0.45em;
          text-align: center;
          transition: border-color 0.15s ease, box-shadow 0.15s ease;

          &:focus-visible {
            outline: none;
            border-color: rgb(235 63 51 / 0.65);
            box-shadow: 0 0 16px rgb(235 63 51 / 0.18);
          }
        }
      }

      .auth-kicker {
        display: flex;
        align-items: center;
        gap: 12px;
        font: 400 13px/1 var(--font-display);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--red);

        &::after {
          content: "";
          flex: 1;
          height: 1px;
          background: linear-gradient(90deg, rgb(235 63 51 / 0.7), rgb(235 63 51 / 0.05));
        }
      }

      .auth-error {
        min-height: 18px;
        color: var(--red-hot);
        font: 400 12px/1.5 var(--font-mono);
      }

      /* ---- app shell ---- */

      .layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        height: 100dvh;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-right: 1px solid var(--line);
        background: var(--surface-chrome);

        & .panel-header {
          padding: 16px 16px 10px;
          border-bottom: 1px solid var(--line);
        }
      }

      .sidebar-title-row {
        display: flex;
        align-items: center;
        gap: 12px;

        & h1 {
          flex: 1;
          margin: 0;
          display: flex;
          align-items: center;
          gap: 10px;
          font: 400 19px/1 var(--font-display);
          letter-spacing: 0.09em;
          text-transform: uppercase;
          color: var(--text);

          &::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgb(235 63 51 / 0.65), rgb(235 63 51 / 0.05));
          }
        }
      }

      .sidebar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .sidebar-new-button {
        height: 30px;
        padding: 0 12px;
        font-size: 10px;
        letter-spacing: 0.08em;
      }

      #status {
        margin: 7px 0 0;
        color: var(--dim);
        font: 400 10px/1.4 var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .ghost-danger {
        border: 0;
        background: none;
        padding: 4px 0;
        color: var(--dim);
        font: 700 10px/1 var(--font-mono);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;

        &:hover {
          color: var(--red-hot);
        }
      }

      /* ---- new session folder picker ---- */

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
        background: rgb(0 0 0 / 0.58);
        backdrop-filter: blur(7px);
      }

      .new-session-panel {
        position: relative;
        isolation: isolate;
        width: min(720px, 100%);
        max-height: min(760px, 100%);
        display: flex;
        flex-direction: column;
        gap: 13px;
        padding: 18px;
        clip-path: var(--shape-console);
        background: linear-gradient(135deg, rgb(255 255 255 / 0.2), rgb(255 255 255 / 0.09) 48%, rgb(235 63 51 / 0.34));

        &::before {
          content: "";
          position: absolute;
          inset: 1px;
          z-index: -2;
          background: var(--bg);
          clip-path: var(--shape-console-inner);
        }

        &::after {
          content: "";
          position: absolute;
          inset: 2px;
          z-index: -1;
          background: linear-gradient(180deg, rgb(255 255 255 / 0.03), transparent 42%), var(--surface-chrome);
          clip-path: var(--shape-console-fill);
        }
      }

      .new-session-head {
        display: flex;
        align-items: center;
        gap: 12px;

        & h2 {
          flex: 1;
          margin: 0;
          font: 400 20px/1 var(--font-display);
          letter-spacing: 0.1em;
          text-transform: uppercase;
        }
      }

      .new-session-close,
      .fs-parent-button,
      .fs-root-button,
      .fs-row {
        border: 1px solid var(--line-row);
        background: var(--surface-control);
        color: var(--text-control);
        cursor: pointer;
        transition: border-color 0.15s ease, background-color 0.15s ease, color 0.15s ease;

        &:hover:not(:disabled) {
          border-color: var(--line-strong);
          background: var(--row-hover);
          color: var(--button-hover-text);
        }

        &:disabled {
          color: var(--dim);
          cursor: default;
          opacity: 0.65;
        }
      }

      .new-session-close {
        width: 34px;
        height: 30px;
        padding: 0;
        font: 700 15px/1 var(--font-mono);
      }

      .fs-current {
        display: grid;
        gap: 5px;
        padding: 11px 12px;
        border: 1px solid var(--line-row);
        background: var(--surface-terminal);
      }

      .fs-label {
        color: var(--dim);
        font: 700 9.5px/1 var(--font-mono);
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .fs-path {
        min-width: 0;
        color: var(--text-control);
        font: 400 12px/1.5 var(--font-mono);
        overflow-wrap: anywhere;
      }

      .fs-roots {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .fs-root-button {
        padding: 7px 10px;
        font: 700 10px/1 var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;

        &.active {
          border-color: rgb(235 63 51 / 0.6);
          color: var(--red-hot);
          background: rgb(235 63 51 / 0.11);
        }
      }

      .fs-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 9px;
      }

      .fs-parent-button {
        min-height: 34px;
        padding: 0 12px;
        font: 700 10px/1 var(--font-mono);
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      .fs-spacer {
        flex: 1 1 auto;
      }

      .fs-list {
        min-height: 180px;
        max-height: min(42dvh, 360px);
        overflow-y: auto;
        border: 1px solid var(--line-row);
        background: var(--surface-terminal);
      }

      .fs-row {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 11px;
        min-height: 42px;
        padding: 8px 12px;
        border: 0;
        border-bottom: 1px solid var(--line-row);
        text-align: left;
        background: transparent;

        &:last-child {
          border-bottom: 0;
        }
      }

      .fs-row-icon {
        flex: 0 0 auto;
        color: var(--red);
        font: 700 13px/1 var(--font-mono);
      }

      .fs-row-text {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .fs-row-name {
        font: 600 14px/1.2 var(--font-body);
      }

      .fs-row-path {
        color: var(--dim);
        font: 400 10.5px/1.35 var(--font-mono);
        overflow-wrap: anywhere;
      }

      .new-session-status {
        min-height: 17px;
        color: var(--dim);
        font: 400 11px/1.5 var(--font-mono);

        &.is-error {
          color: var(--red-hot);
        }
      }

      /* ---- session list: full-bleed hairline rows with a status rail ---- */

      #sessions {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding-bottom: env(safe-area-inset-bottom);
      }

      .session-item {
        position: relative;
        width: 100%;
        text-align: left;
        border: 0;
        border-bottom: 1px solid var(--line-row);
        background: transparent;
        padding: 12px 14px 12px 18px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition: background-color 0.15s ease;

        &:hover {
          background: var(--row-hover);
        }

        &.active {
          background: linear-gradient(90deg, rgb(235 63 51 / 0.11), transparent 70%);
        }
      }

      /* the .live-dot span doubles as the row's 2px status rail */
      .live-dot {
        position: absolute;
        left: 0;
        top: 0;
        bottom: -1px;
        width: 2px;
        background: var(--live-dot-bg);
      }

      .session-item.working .live-dot {
        background: var(--red);
        box-shadow: 0 0 10px rgb(235 63 51 / 0.5);
        animation: rail-pulse 1.6s ease-in-out infinite;
      }

      .session-item.needs-approval .live-dot {
        background: var(--red-hot);
        box-shadow: 0 0 12px rgb(235 63 51 / 0.65);
        animation: rail-pulse 1.1s ease-in-out infinite;
      }

      @keyframes rail-pulse {
        50% {
          opacity: 0.4;
        }
      }

      .session-top {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .session-title {
        flex: 1;
        min-width: 0;
        font: 600 15px/1.25 var(--font-body);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .session-approval {
        flex: 0 0 auto;
        font: 700 9px/1 var(--font-mono);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--permission-badge-text);
        background: rgb(235 63 51 / 0.16);
        clip-path: var(--shape-chip);
        padding: 4px 8px 3px;
        animation: attention-fade 1.4s ease-in-out infinite;
      }

      .session-meta {
        display: flex;
        flex-wrap: wrap;
        column-gap: 12px;
        color: var(--muted);
        font: 400 11px/1.5 var(--font-mono);
        min-width: 0;

        & span {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          max-width: 100%;
        }
      }

      .session-foot {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--dim);
        font: 400 9.5px/1.5 var(--font-mono);
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      /* ---- chat panel ---- */

      .main {
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
        background: var(--surface-well);
      }

      .chat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        padding-top: calc(10px + env(safe-area-inset-top));
        padding-right: calc(18px + var(--theme-toggle-reserve) + env(safe-area-inset-right));
        border-bottom: 1px solid var(--line);
        background: var(--surface-chrome);
      }

      .icon-button {
        display: none;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        flex: 0 0 auto;
        font-size: 16px;
        letter-spacing: 0;
      }

      .chat-heading {
        min-width: 0;
        flex: 1;

        & h2 {
          margin: 0;
          font: 600 16px/1.3 var(--font-body);
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        & p {
          margin: 2px 0 0;
          color: var(--dim);
          font: 400 10px/1.4 var(--font-mono);
          letter-spacing: 0.07em;
          text-transform: uppercase;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
      }

      .working-badge {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--red-hot);
        font: 700 10px/1 var(--font-mono);
        letter-spacing: 0.12em;
        text-transform: uppercase;

        &::after {
          content: "";
          width: 6px;
          height: 11px;
          background: currentColor;
          animation: cursor-blink 1.05s steps(2, start) infinite;
        }
      }

      .approval-badge {
        flex: 0 0 auto;
        font: 700 10px/1 var(--font-mono);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--permission-badge-text);
        background: rgb(235 63 51 / 0.16);
        clip-path: var(--shape-chip);
        padding: 5px 9px 4px;
        animation: attention-fade 1.4s ease-in-out infinite;
      }

      @keyframes attention-fade {
        50% {
          opacity: 0.55;
        }
      }

      @keyframes cursor-blink {
        50% {
          opacity: 0;
        }
      }

      .transcript-wrap {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      #transcript {
        height: 100%;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 0 0 20px;
        display: flex;
        flex-direction: column;
      }

      .jump-to-latest {
        position: absolute;
        right: 18px;
        bottom: 14px;
        padding: 9px 13px 8px;
        font-size: 10px;

        &.has-new {
          --key-edge: rgb(235 63 51 / 0.52);
          --key-edge-hover: rgb(235 63 51 / 0.85);
          --key-fill:
            linear-gradient(90deg, rgb(235 63 51 / 0.2), transparent 58%),
            linear-gradient(180deg, rgb(235 63 51 / 0.14), rgb(235 63 51 / 0.03)),
            #151010;
          --key-text: #ffe9e6;
          filter: drop-shadow(0 0 9px rgb(235 63 51 / 0.3));
        }
      }

      /* ---- transcript entries: flat log rows, kind rail + mono label ---- */

      .entry {
        --kind-color: var(--system);
        position: relative;
        border-bottom: 1px solid var(--line-row);
        padding: 13px 18px 15px;
        animation: entry-in 0.18s ease-out;

        &::before {
          content: "";
          position: absolute;
          left: 0;
          top: 13px;
          bottom: 13px;
          width: 2px;
          background: var(--kind-color);
          opacity: 0.8;
        }

        &[data-kind="user"] { --kind-color: var(--user); }
        &[data-kind="agent"] { --kind-color: var(--agent); }
        &[data-kind="thought"] { --kind-color: var(--thought); }
        &[data-kind="tool"] { --kind-color: var(--tool); }
      }

      @keyframes entry-in {
        from {
          opacity: 0;
          translate: 0 4px;
        }
      }

      .entry-header {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 7px;
      }

      .entry-kind {
        flex: 0 0 auto;
        font: 700 10px/1 var(--font-mono);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--kind-color);
      }

      .entry-time {
        margin-left: auto;
        color: var(--dim);
        font: 400 10px/1 var(--font-mono);
        white-space: nowrap;
      }

      .entry-body {
        font-size: 15px;
        font-weight: 500;
        line-height: 1.55;
        word-break: break-word;

        & .entry-text {
          margin: 0 0 10px;
          white-space: pre-wrap;
          font: 400 12.5px/1.65 var(--font-mono);

          /* Inside an already-mono run, inline code and paths signal with
             color alone — boxes around every token would read as noise. */
          & code {
            border: 0;
            background: transparent;
            padding: 0;
            font-size: inherit;
            color: var(--text-control);
          }
        }

        & p {
          margin: 0 0 10px;
          white-space: pre-wrap;
        }

        & h4,
        & h5,
        & h6 {
          margin: 14px 0 6px;
          font: 700 13px/1.4 var(--font-body);
          letter-spacing: 0.06em;
          text-transform: uppercase;
        }

        & ul,
        & ol {
          margin: 0 0 10px;
          padding-left: 22px;
        }

        & li {
          margin: 2px 0;
        }

        & a {
          color: var(--red-hot);
          text-underline-offset: 3px;
        }

        & code {
          font: 400 0.88em/1.5 var(--font-mono);
          background: var(--inline-bg);
          border: 1px solid var(--line-row);
          padding: 1px 5px;
        }

        & pre.code-block {
          margin: 2px 0 12px;
          padding: 10px 12px;
          background: var(--bg);
          border: 1px solid var(--line-row);
          overflow: auto;
          max-height: 340px;
          /* Plain identifiers and punctuation recede so tinted tokens carry
             the structure, whatever kind of entry the block sits in. */
          color: var(--muted);

          &[data-lang]::before {
            content: attr(data-lang);
            float: right;
            margin: -3px -5px 4px 14px;
            font: 700 9px/1 var(--font-mono);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--dim);
          }

          & code {
            border: 0;
            background: transparent;
            padding: 0;
            font-size: 12px;
            white-space: pre;
          }
        }

        /* Syntax roles reuse the kind hues as a fixed code theme: names blue,
           strings green, keywords/numbers amber, macros violet, calls bright.
           Inside a code surface they read as syntax, not entry coding. */
        & .tok-key { color: var(--user); }
        & .tok-str { color: var(--agent); }
        & .tok-num { color: var(--thought); }
        & .tok-kw { color: var(--thought); font-weight: 700; }
        & .tok-cmt { color: var(--dim); font-style: italic; }
        & .tok-type { color: var(--user); }
        & .tok-fn { color: var(--text-control); }
        & .tok-mac { color: var(--tool); }
        & .tok-add { color: var(--agent); }
        & .tok-del { color: var(--red-hot); }
        & .cmd-prompt { color: var(--dim); }
        & .cmd-program { color: var(--text-control); font-weight: 700; }
        & .cmd-subcommand { color: var(--user); }
        & .cmd-flag { color: var(--thought); }
        & .cmd-path { color: var(--agent); }
        & .cmd-env { color: var(--tool); }
        & .cmd-string { color: var(--agent); }
        & .cmd-op { color: var(--dim); }

        & details.block-fold {
          margin: 2px 0 12px;
          border: 1px solid var(--line-row);
          background: var(--bg);

          & > summary {
            list-style: none;
            cursor: pointer;
            padding: 8px 12px;
            font: 700 9.5px/1 var(--font-mono);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--dim);
            user-select: none;

            &::-webkit-details-marker {
              display: none;
            }

            &::before {
              content: "▸";
              display: inline-block;
              margin-right: 9px;
              color: var(--red);
              transition: rotate 0.12s;
            }

            &:hover {
              color: var(--muted);
            }
          }

          &[open] > summary {
            color: var(--muted);
            border-bottom: 1px solid var(--line-row);

            &::before {
              rotate: 90deg;
            }
          }

          /* Opening a fold is an explicit request to read the payload, so
             folded content gets more height than an inline block. */
          & > pre.code-block {
            margin: 0;
            border: 0;
            max-height: 60vh;
          }

          & > pre.entry-text {
            margin: 0;
            padding: 10px 12px;
            max-height: 60vh;
            overflow: auto;
          }
        }

        & .meta-line {
          margin: 0 0 8px;
          font: 400 11px/1.6 var(--font-mono);
          color: var(--dim);
          white-space: pre-wrap;

          & strong {
            color: var(--muted);
          }

          & code {
            font-size: 10.5px;
          }
        }

        & code.path {
          background: var(--inline-bg);
          color: var(--text-control);
        }

        & em {
          font-style: italic;
          color: var(--muted);
        }

        & .table-scroll {
          margin: 2px 0 12px;
          overflow-x: auto;
          border: 1px solid var(--line-row);
        }

        & table.md-table {
          border-collapse: collapse;
          width: 100%;
          font-size: 13.5px;
          line-height: 1.45;

          & th {
            font: 700 10px/1.4 var(--font-mono);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--dim);
            text-align: left;
          }

          & th,
          & td {
            padding: 6px 12px;
            border-bottom: 1px solid var(--line-row);
            vertical-align: top;
          }

          & tr:last-child td {
            border-bottom: 0;
          }
        }

        & > :last-child {
          margin-bottom: 0;
        }
      }

      .entry[data-kind="user"] .entry-text {
        color: var(--user-entry-text);
      }

      .entry[data-kind="tool"] .entry-text,
      .entry[data-kind="system"] .entry-text {
        color: var(--muted);
      }

      .entry[data-kind="thought"] .entry-body {
        color: var(--muted);
        font-size: 14.5px;
      }

      /* ---- pending permissions: the app's alarm state ---- */

      .permission-list {
        display: flex;
        flex-direction: column;
        gap: 10px;

        &:empty {
          display: none;
        }
      }

      .permission-card {
        border: 1px solid rgb(235 63 51 / 0.5);
        background: linear-gradient(90deg, rgb(235 63 51 / 0.07), transparent 55%), var(--surface-panel);
        box-shadow: 0 0 20px rgb(235 63 51 / 0.14);
        padding: 12px 14px 13px;
      }

      .permission-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .permission-label {
        font: 700 10px/1 var(--font-mono);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--red-hot);
        text-shadow: 0 0 10px rgb(235 63 51 / 0.45);
      }

      .permission-time {
        color: var(--dim);
        font: 400 10px/1 var(--font-mono);
        white-space: nowrap;
      }

      /* Never truncate the requested permission: the full command stays
         readable by scrolling this block. */
      .permission-title {
        margin: 10px 0 12px;
        white-space: pre-wrap;
        word-break: break-word;
        font: 400 12px/1.6 var(--font-mono);
        color: var(--text-control);
        background: var(--bg);
        border: 1px solid var(--line-row);
        padding: 10px 12px;
        max-height: 30dvh;
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .permission-options {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .permission-option {
        height: 32px;
        padding: 0 14px;
        letter-spacing: 0.08em;

        &[data-kind^="allow"] {
          --key-edge: rgb(79 174 132 / 0.45);
          --key-edge-hover: rgb(79 174 132 / 0.8);
          --key-fill:
            linear-gradient(90deg, rgb(79 174 132 / 0.16), transparent 58%),
            linear-gradient(180deg, rgb(79 174 132 / 0.12), rgb(79 174 132 / 0.02)),
            #0f1512;
          --key-text: #a9dfc4;
          --key-text-hover: #d7f4e5;
        }

        &[data-kind^="reject"] {
          --key-edge: rgb(235 63 51 / 0.4);
          --key-edge-hover: rgb(235 63 51 / 0.75);
          --key-fill:
            linear-gradient(90deg, rgb(235 63 51 / 0.12), transparent 58%),
            linear-gradient(180deg, rgb(235 63 51 / 0.08), rgb(235 63 51 / 0.02)),
            #151010;
          --key-text: #f39c94;
          --key-text-hover: #ffc4be;
        }
      }

      .permission-status {
        color: var(--dim);
        font: 400 11px/1.5 var(--font-mono);

        &:empty {
          display: none;
        }

        &:not(:empty) {
          margin-top: 9px;
        }
      }

      /* ---- composer: one machined console ---- */

      .composer {
        border-top: 1px solid var(--line);
        background: var(--surface-chrome);
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* queued prompts: compact mono rows above the console */
      .queue-list {
        display: flex;
        flex-direction: column;
        max-height: 28dvh;
        overflow-y: auto;
        overscroll-behavior: contain;

        &:empty {
          display: none;
        }
      }

      .queue-item {
        position: relative;
        padding: 8px 12px 9px 14px;
        border-bottom: 1px solid var(--line-row);
        background: var(--row-subtle);

        &::before {
          content: "";
          position: absolute;
          left: 0;
          top: 0;
          bottom: -1px;
          width: 2px;
          background: var(--line-strong);
        }

        &:last-child {
          border-bottom: 0;

          &::before {
            bottom: 0;
          }
        }
      }

      .queue-item-time {
        color: var(--dim);
        font: 400 9.5px/1 var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 5px;

        &::before {
          content: "queued · ";
        }
      }

      .queue-item-text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font: 400 12px/1.55 var(--font-mono);
        color: var(--text-control);
      }

      /* The frame is a dedicated child (edge bg + gap/fill pseudos) instead of
         layers on .console itself: clip-path on .console would also clip the
         combobox popups that open out of the control strip. */
      .console {
        position: relative;
        isolation: isolate;
      }

      .console-frame {
        position: absolute;
        inset: 0;
        z-index: -1;
        clip-path: var(--shape-console);
        background: linear-gradient(90deg, rgb(255 255 255 / 0.17), rgb(255 255 255 / 0.09) 55%, rgb(235 63 51 / 0.4));
        transition: background 0.15s ease, filter 0.15s ease;

        &::before {
          content: "";
          position: absolute;
          inset: 1px;
          background: var(--bg);
          clip-path: var(--shape-console-inner);
        }

        &::after {
          content: "";
          position: absolute;
          inset: 2px;
          background: linear-gradient(180deg, rgb(255 255 255 / 0.025), transparent 34%), var(--surface-terminal);
          clip-path: var(--shape-console-fill);
        }
      }

      .console:focus-within .console-frame {
        background: linear-gradient(90deg, rgb(235 63 51 / 0.5), rgb(255 255 255 / 0.13) 45%, rgb(235 63 51 / 0.55));
        filter: drop-shadow(0 0 12px rgb(235 63 51 / 0.14));
      }

      /* red prompt glyph in the textarea gutter */
      .console::before {
        content: "$";
        position: absolute;
        left: 15px;
        top: 13px;
        z-index: 1;
        pointer-events: none;
        font: 700 13px/1.55 var(--font-mono);
        color: var(--red);
        text-shadow: 0 0 8px rgb(235 63 51 / 0.5);
      }

      .console:has(textarea:disabled)::before {
        color: var(--dim);
        text-shadow: none;
      }

      .console textarea {
        display: block;
        width: 100%;
        min-height: 56px;
        max-height: 200px;
        resize: none;
        overflow-y: auto;
        border: 0;
        background: transparent;
        color: var(--text);
        caret-color: var(--red);
        padding: 13px 14px 9px 32px;
        font: 400 13px/1.55 var(--font-mono);

        &:focus,
        &:focus-visible {
          outline: none; /* the console frame itself signals focus */
        }

        &:disabled {
          color: var(--dim);
        }
      }

      .command-palette {
        margin: -3px 8px 8px 32px;
        max-height: 180px;
        overflow-y: auto;
        border-top: 1px solid var(--line-row);
        border-bottom: 1px solid var(--line-row);
        background: rgb(255 255 255 / 0.018);

        &:empty,
        &[hidden] {
          display: none;
        }
      }

      .command-option {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(110px, max-content) minmax(0, 1fr);
        gap: 10px;
        align-items: baseline;
        border: 0;
        border-bottom: 1px solid var(--line-row);
        background: transparent;
        color: var(--text-control);
        padding: 7px 9px;
        text-align: left;
        cursor: pointer;

        &:last-child {
          border-bottom: 0;
        }

        &.is-selected {
          background: rgb(235 63 51 / 0.13);
          color: var(--button-hover-text);
        }
      }

      .command-option-name {
        font: 700 11px/1.35 var(--font-mono);
        color: var(--red-hot);
        overflow-wrap: anywhere;
      }

      .command-option-desc {
        min-width: 0;
        color: var(--muted);
        font: 400 11px/1.35 var(--font-mono);
        overflow-wrap: anywhere;
      }

      /* control strip: inline settings · queue status · Queue key */
      .console-strip {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 16px;
        padding: 7px 8px 7px 14px;
        border-top: 1px solid var(--line-row);
      }

      .config-strip {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px 16px;
        min-width: 0;
        flex: 0 1 auto;

        &:empty {
          display: none;
        }
      }

      .config-option {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .config-option-name {
        flex: none;
        font: 700 9.5px/1 var(--font-mono);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--dim);
      }

      .config-option-status {
        font: 400 9.5px/1 var(--font-mono);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--red-hot);
        white-space: nowrap;
        animation: attention-fade 1.4s ease-in-out infinite;

        &:empty {
          display: none;
        }
      }

      .config-combo {
        position: relative;
        min-width: 0;
      }

      .config-combo-trigger {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 260px;
        border: 0;
        background: transparent;
        padding: 5px 2px;
        color: var(--text-control);
        font: 500 12px/1.2 var(--font-mono);
        text-align: left;
        cursor: pointer;
        transition: color 0.12s ease;

        &:hover {
          color: var(--button-hover-text);
        }

        &[aria-expanded="true"] {
          color: var(--red-hot);
        }

        &:disabled {
          cursor: progress;
          opacity: 0.5;
        }
      }

      .config-combo-value {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .config-combo-chevron {
        flex: none;
        width: 6px;
        height: 6px;
        border-right: 1.5px solid var(--dim);
        border-bottom: 1.5px solid var(--dim);
        transform: translateY(-2px) rotate(45deg);
      }

      .config-combo-trigger:hover .config-combo-chevron,
      .config-combo-trigger[aria-expanded="true"] .config-combo-chevron {
        border-color: currentColor;
      }

      /* Anchored above the trigger: the strip sits at the bottom of the
         screen, so a downward popup would overflow. */
      .config-combo-popup {
        position: absolute;
        z-index: 30;
        bottom: calc(100% + 8px);
        left: 0;
        min-width: min(250px, 76vw);
        max-width: min(360px, 80vw);
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
        background: var(--surface-panel);
        border: 1px solid var(--line-control);
        box-shadow: 0 18px 44px var(--overlay-shadow);
      }

      .config-combo-search {
        width: 100%;
        border: 1px solid var(--line-control);
        background: var(--bg);
        color: var(--text);
        caret-color: var(--red);
        padding: 7px 9px;
        font: 400 12px/1.4 var(--font-mono);

        &:focus-visible {
          outline: none;
          border-color: rgb(235 63 51 / 0.6);
        }
      }

      .config-combo-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 244px;
        overflow-y: auto;
        overscroll-behavior: contain;
        display: flex;
        flex-direction: column;
      }

      .config-combo-option {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 7px 9px;
        border-left: 2px solid transparent;
        cursor: pointer;

        &.is-active {
          background: rgb(235 63 51 / 0.12);
          border-left-color: var(--red);
        }

        &.is-selected .config-combo-option-label {
          color: var(--red-hot);
          font-weight: 700;
        }
      }

      .config-combo-option-label {
        font: 400 12px/1.4 var(--font-mono);
        color: var(--text-control);
        word-break: break-word;
      }

      .config-combo-option-desc {
        font: 400 10.5px/1.5 var(--font-mono);
        color: var(--dim);
        word-break: break-word;
      }

      .config-combo-empty {
        padding: 8px 9px;
        color: var(--dim);
        font: 400 11px/1.4 var(--font-mono);
      }

      #queue-status {
        margin-left: auto;
        flex: none;
        color: var(--dim);
        font: 400 10px/1.4 var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: right;

        &.is-error {
          color: var(--red-hot);
        }

        &:empty {
          display: none;
        }
      }

      #queue-submit {
        flex: none;
        height: 30px;
        padding: 0 16px;
      }

      /* ---- phone layout: list <-> chat navigation ---- */

      @media (max-width: 800px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .layout:not(.show-chat) .main {
          display: none;
        }

        .layout.show-chat .sidebar {
          display: none;
        }

        .icon-button {
          display: inline-flex;
        }

        .sidebar .panel-header {
          padding-top: calc(16px + env(safe-area-inset-top));
          padding-right: calc(16px + var(--theme-toggle-reserve) + env(safe-area-inset-right));
        }

        .sidebar-title-row {
          gap: 8px;
        }

        .sidebar-actions {
          gap: 7px;
        }

        .sidebar-new-button {
          padding: 0 10px;
        }

        .modal-backdrop {
          align-items: stretch;
          padding: calc(12px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
        }

        .new-session-panel {
          max-height: 100%;
          padding: 14px;
        }

        .fs-list {
          max-height: none;
          flex: 1;
        }

        .fs-toolbar .primary {
          flex: 1 1 160px;
        }

        .entry {
          padding: 12px 14px 14px;
        }

        .chat-header {
          padding-left: 12px;
          padding-right: calc(12px + var(--theme-toggle-reserve) + env(safe-area-inset-right));
        }

        .composer {
          gap: 8px;
          padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        }

        .console-strip {
          gap: 2px 12px;
          padding: 6px 8px 6px 12px;
        }

        .config-combo-trigger {
          max-width: 60vw;
          min-height: 30px;
        }

        .config-combo-popup {
          position: fixed;
          left: 10px;
          right: 10px;
          bottom: calc(var(--keyboard-inset) + env(safe-area-inset-bottom) + 10px);
          min-width: 0;
          max-width: calc(100vw - 20px);
          max-height: min(58dvh, calc(100dvh - var(--keyboard-inset) - 28px));
          z-index: 80;
        }

        .config-combo-popup.is-searching {
          top: calc(env(safe-area-inset-top) + 10px);
          max-height: none;
        }

        .config-combo-search {
          font-size: 16px;
        }

        .config-combo-list {
          max-height: min(44dvh, calc(100dvh - var(--keyboard-inset) - 128px));
        }

        .config-combo-popup.is-searching .config-combo-list {
          flex: 1;
          min-height: 0;
          max-height: none;
        }

        .console textarea {
          padding: 11px 12px 8px 30px;
        }

        .console::before {
          left: 13px;
          top: 11px;
        }

        .queue-list {
          max-height: 18dvh;
        }

        .auth-card {
          padding: 24px 20px 20px;

          & h1 {
            font-size: 36px;
          }
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .entry,
        .working-badge::after,
        .approval-badge,
        .session-approval,
        .config-option-status,
        .session-item.working .live-dot,
        .session-item.needs-approval .live-dot {
          animation: none;
        }

        .entry-body details.block-fold > summary::before {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to light mode" aria-pressed="false">Light</button>

    <section id="auth-screen" class="auth-screen">
      <div class="auth-card">
        <div class="auth-kicker">Remote console</div>
        <h1>Mjolnir</h1>
        <p>Enter the six-digit viewer code printed by <code>mj server</code>.</p>
        <form id="auth-form">
          <label for="auth-token">Viewer code</label>
          <input id="auth-token" name="code" type="password" inputmode="numeric" autocomplete="one-time-code" spellcheck="false" maxlength="6" pattern="[0-9]{6}">
          <button id="auth-submit" class="primary" type="submit">Sign in</button>
        </form>
        <div id="auth-error" class="auth-error" role="alert"></div>
      </div>
    </section>

    <div id="app" class="layout" hidden>
      <aside class="sidebar">
        <div class="panel-header">
          <div class="sidebar-title-row">
            <h1>Mjolnir</h1>
            <div class="sidebar-actions">
              <button id="new-session-button" class="primary sidebar-new-button" type="button">New</button>
              <button id="logout-button" class="ghost-danger" type="button">Log out</button>
            </div>
          </div>
          <p id="status">Loading…</p>
        </div>
        <div id="sessions"></div>
      </aside>
      <main class="main">
        <header class="chat-header">
          <button id="back-button" class="icon-button" type="button" aria-label="Back to sessions">←</button>
          <div class="chat-heading">
            <h2 id="transcript-title">Transcript</h2>
            <p id="transcript-meta">Select a session to inspect its history.</p>
          </div>
          <span id="approval-badge" class="approval-badge" hidden>needs approval</span>
          <span id="working-badge" class="working-badge" hidden>working</span>
        </header>
        <div class="transcript-wrap">
          <div id="transcript" role="log" aria-label="Session transcript"></div>
          <button id="jump-to-latest" class="jump-to-latest" type="button" hidden>Jump to latest</button>
        </div>
        <section class="composer">
          <div id="permissions" class="permission-list"></div>
          <div id="queue-list" class="queue-list"></div>
          <div class="console">
            <span class="console-frame" aria-hidden="true"></span>
            <textarea id="queue-input" placeholder="Queue a prompt — runs when the session is idle" enterkeyhint="send" aria-label="Prompt to queue"></textarea>
            <div id="command-palette" class="command-palette" role="listbox" aria-label="Slash commands" hidden></div>
            <div class="console-strip">
              <div id="session-config" class="config-strip"></div>
              <span id="queue-status" class="queue-meta">Select a session.</span>
              <button id="queue-submit" class="primary" type="button">Queue</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <section id="new-session-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="new-session-title" hidden>
      <div class="new-session-panel">
        <header class="new-session-head">
          <h2 id="new-session-title">New session</h2>
          <button id="new-session-close" class="new-session-close" type="button" aria-label="Close new session picker">×</button>
        </header>
        <div class="fs-current">
          <span class="fs-label">Current folder</span>
          <span id="fs-current-path" class="fs-path"></span>
        </div>
        <div id="fs-roots" class="fs-roots" aria-label="Workspace roots"></div>
        <div class="fs-toolbar">
          <button id="fs-parent-button" class="fs-parent-button" type="button">Up</button>
          <span class="fs-spacer"></span>
          <button id="new-session-start" class="primary" type="button">Start session</button>
        </div>
        <div id="fs-list" class="fs-list" aria-label="Folders"></div>
        <div id="new-session-status" class="new-session-status" role="status"></div>
      </div>
    </section>

    <template id="tpl-session">
      <button type="button" class="session-item">
        <div class="session-top">
          <span class="live-dot" aria-hidden="true"></span>
          <span class="session-title"></span>
          <span class="session-approval" hidden>approval</span>
        </div>
        <div class="session-meta">
          <span class="session-project"></span>
          <span class="session-agent"></span>
        </div>
        <div class="session-foot">
          <span class="session-counts"></span>
          <span class="session-updated" data-ts=""></span>
        </div>
      </button>
    </template>

    <template id="tpl-entry">
      <article class="entry">
        <header class="entry-header">
          <span class="entry-kind"></span>
          <time class="entry-time" data-ts=""></time>
        </header>
        <div class="entry-body"></div>
      </article>
    </template>

    <template id="tpl-permission">
      <section class="permission-card">
        <header class="permission-header">
          <span class="permission-label">Permission needed</span>
          <time class="permission-time" data-ts=""></time>
        </header>
        <pre class="permission-title"></pre>
        <div class="permission-options"></div>
        <div class="permission-status"></div>
      </section>
    </template>

    <template id="tpl-queue-item">
      <section class="queue-item">
        <div class="queue-item-time" data-ts=""></div>
        <pre class="queue-item-text"></pre>
      </section>
    </template>

    <template id="tpl-config-option">
      <div class="config-option">
        <span class="config-option-name"></span>
        <span class="config-option-status"></span>
      </div>
    </template>

    <script type="module">
      const queryParams = new URLSearchParams(window.location.search);
      const viewerToken = queryParams.get("token") || "";

      const $ = (id) => document.getElementById(id);
      const themeToggleEl = $("theme-toggle");
      const authScreenEl = $("auth-screen");
      const appEl = $("app");
      const authFormEl = $("auth-form");
      const authTokenEl = $("auth-token");
      const authSubmitEl = $("auth-submit");
      const authErrorEl = $("auth-error");
      const logoutButtonEl = $("logout-button");
      const newSessionButtonEl = $("new-session-button");
      const newSessionModalEl = $("new-session-modal");
      const newSessionCloseEl = $("new-session-close");
      const newSessionStartEl = $("new-session-start");
      const newSessionStatusEl = $("new-session-status");
      const fsCurrentPathEl = $("fs-current-path");
      const fsRootsEl = $("fs-roots");
      const fsParentButtonEl = $("fs-parent-button");
      const fsListEl = $("fs-list");
      const statusEl = $("status");
      const sessionsEl = $("sessions");
      const transcriptEl = $("transcript");
      const transcriptTitleEl = $("transcript-title");
      const transcriptMetaEl = $("transcript-meta");
      const workingBadgeEl = $("working-badge");
      const approvalBadgeEl = $("approval-badge");
      const backButtonEl = $("back-button");
      const permissionsEl = $("permissions");
      const sessionConfigEl = $("session-config");
      const queueInputEl = $("queue-input");
      const commandPaletteEl = $("command-palette");
      const queueSubmitEl = $("queue-submit");
      const queueStatusEl = $("queue-status");
      const queueListEl = $("queue-list");
      const jumpToLatestEl = $("jump-to-latest");
      const sessionTpl = $("tpl-session");
      const entryTpl = $("tpl-entry");
      const queueTpl = $("tpl-queue-item");
      const permissionTpl = $("tpl-permission");
      const configOptionTpl = $("tpl-config-option");

      const POLL_MS = 2000;
      const WORKING_WINDOW_MS = 6000;
      const THEME_STORAGE_KEY = "mjolnir-remote-theme";
      const THEME_COLORS = {
        dark: "#050606",
        light: "#f7f2e8",
      };
      // How long a sent config change may stay "applying…" before the control
      // re-enables. The session applies changes only between turns, and a
      // change it cannot apply at all (agent rejected it) never shows up in a
      // snapshot — without this cap such a change would disable its combobox
      // forever. The queued change itself is unaffected: it still applies (or
      // dies with the session) server-side.
      const CONFIG_APPLY_TIMEOUT_MS = 60000;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      const narrowScreen = window.matchMedia("(max-width: 800px)");

      let sessions = [];
      let queuedPrompts = [];
      let selectedSessionId = null;
      let refreshTimer = null;
      let authenticated = false;
      let shouldStickToBottom = true;
      let forceScrollToBottom = false;
      let pendingNewEntries = 0;
      let filesystemState = null;
      let filesystemLoading = false;
      let creatingSession = false;
      let commandMatches = [];
      let commandSelected = 0;
      const draftBySessionId = new Map();
      const activityBySessionId = new Map();
      const sessionCardById = new Map();
      // Decisions already POSTed, keyed "<session_id>\u001f<request_id>",
      // so the buttons stay disabled until the pending request disappears
      // from the next snapshot.
      const sentDecisions = new Set();
      // Config changes already POSTed, mapping "<session_id>\u001f<target>" to
      // { value, sentAt } for the change we sent. The select stays disabled
      // (showing the sent value) until the next snapshot's current_value
      // matches, confirming the session applied it, or until
      // CONFIG_APPLY_TIMEOUT_MS passes.
      const sentConfigChanges = new Map();
      // Persistent combobox controllers keyed by "<session_id><target>", kept
      // across polls so an open/searched dropdown is never torn down by a
      // background snapshot refresh.
      const configCombos = new Map();
      // Keyed render state: the transcript DOM is patched in place instead of
      // rebuilt on every poll, so text selection and scroll momentum survive.
      let renderedSessionId = null;
      let renderedEntries = [];

      function scrollBehavior() {
        return reducedMotion.matches ? "auto" : "smooth";
      }

      function currentTheme() {
        return document.documentElement.dataset.theme === "light" ? "light" : "dark";
      }

      function applyTheme(theme) {
        const light = theme === "light";
        if (light) {
          document.documentElement.dataset.theme = "light";
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
        themeToggleEl.textContent = light ? "Dark" : "Light";
        themeToggleEl.setAttribute("aria-label", `Switch to ${light ? "dark" : "light"} mode`);
        themeToggleEl.setAttribute("aria-pressed", light ? "true" : "false");
        document.querySelector('meta[name="theme-color"]')?.setAttribute(
          "content",
          THEME_COLORS[light ? "light" : "dark"],
        );
      }

      function setTheme(theme) {
        applyTheme(theme);
        try {
          localStorage.setItem(THEME_STORAGE_KEY, theme);
        } catch {
          // The current page can still switch themes when storage is blocked.
        }
      }

      function syncKeyboardInset() {
        const viewport = window.visualViewport;
        const inset = viewport
          ? Math.max(0, window.innerHeight - viewport.height - viewport.offsetTop)
          : 0;
        document.documentElement.style.setProperty("--keyboard-inset", `${Math.round(inset)}px`);
      }

      function isNarrowScreen() {
        return narrowScreen.matches || window.innerWidth <= 800;
      }

      function withViewTransition(update) {
        if (document.startViewTransition && !reducedMotion.matches) {
          const transition = document.startViewTransition(update);
          transition.ready.catch(() => {});
        } else {
          update();
        }
      }

      function cloneTemplate(template) {
        return template.content.firstElementChild.cloneNode(true);
      }

      function emptyNote(text) {
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = text;
        return div;
      }

      function showAuth(message = "") {
        authenticated = false;
        authErrorEl.textContent = message;
        authScreenEl.hidden = false;
        appEl.hidden = true;
        sessions = [];
        queuedPrompts = [];
        selectedSessionId = null;
        filesystemState = null;
        filesystemLoading = false;
        creatingSession = false;
        newSessionModalEl.hidden = true;
        sessionCardById.clear();
        activityBySessionId.clear();
        sentDecisions.clear();
        sentConfigChanges.clear();
        configCombos.clear();
        renderedSessionId = null;
        renderedEntries = [];
        if (refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
      }

      function showApp() {
        authenticated = true;
        authErrorEl.textContent = "";
        authScreenEl.hidden = true;
        appEl.hidden = false;
        if (!refreshTimer) {
          refreshTimer = setInterval(refreshSessions, POLL_MS);
        }
      }

      async function apiFetch(url, options = {}) {
        const requestUrl = new URL(url, window.location.origin);
        if (viewerToken && !requestUrl.searchParams.has("token")) {
          requestUrl.searchParams.set("token", viewerToken);
        }
        const response = await fetch(requestUrl, {
          ...options,
          credentials: "same-origin",
          headers: {
            ...(options.headers || {}),
          },
        });
        if (response.status === 401) {
          showAuth("Your session expired. Enter the six-digit viewer code again.");
          throw new Error("HTTP 401");
        }
        return response;
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      /* ---- new session folder picker ---- */

      function setNewSessionStatus(text, isError = false) {
        newSessionStatusEl.textContent = text;
        newSessionStatusEl.classList.toggle("is-error", isError);
      }

      function setFilesystemBusy(busy) {
        filesystemLoading = busy;
        fsParentButtonEl.disabled = busy || !filesystemState?.parent || creatingSession;
        newSessionStartEl.disabled = busy || !filesystemState?.current || creatingSession;
        fsRootsEl.querySelectorAll("button").forEach((button) => {
          button.disabled = busy || creatingSession;
        });
        fsListEl.querySelectorAll("button").forEach((button) => {
          button.disabled = busy || creatingSession;
        });
      }

      function openNewSessionPicker() {
        if (!authenticated) {
          return;
        }
        newSessionModalEl.hidden = false;
        setNewSessionStatus("");
        void loadFilesystem();
      }

      function closeNewSessionPicker() {
        if (creatingSession) {
          return;
        }
        newSessionModalEl.hidden = true;
      }

      function directoryButton(record, className, onClick) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = className;
        button.addEventListener("click", onClick);
        return button;
      }

      function renderFilesystemPicker() {
        fsRootsEl.replaceChildren();
        fsListEl.replaceChildren();
        const current = filesystemState?.current || null;
        fsCurrentPathEl.textContent = current?.display_path || "";

        for (const root of filesystemState?.roots || []) {
          const button = directoryButton(root, "fs-root-button", () => {
            void loadFilesystem(root.path);
          });
          button.textContent = root.name || root.display_path || root.path;
          button.title = root.display_path || root.path;
          button.classList.toggle("active", current?.path === root.path);
          fsRootsEl.appendChild(button);
        }

        fsParentButtonEl.onclick = () => {
          if (filesystemState?.parent) {
            void loadFilesystem(filesystemState.parent.path);
          }
        };

        const entries = filesystemState?.entries || [];
        if (!entries.length) {
          fsListEl.appendChild(emptyNote("No folders"));
        } else {
          for (const entry of entries) {
            const button = directoryButton(entry, "fs-row", () => {
              void loadFilesystem(entry.path);
            });
            const icon = document.createElement("span");
            icon.className = "fs-row-icon";
            icon.textContent = ">";
            const text = document.createElement("span");
            text.className = "fs-row-text";
            const name = document.createElement("span");
            name.className = "fs-row-name";
            name.textContent = entry.name || entry.path;
            const path = document.createElement("span");
            path.className = "fs-row-path";
            path.textContent = entry.display_path || entry.path;
            text.append(name, path);
            button.append(icon, text);
            fsListEl.appendChild(button);
          }
        }

        setFilesystemBusy(filesystemLoading);
      }

      async function loadFilesystem(path = "") {
        if (filesystemLoading || creatingSession) {
          return;
        }
        setFilesystemBusy(true);
        setNewSessionStatus("Loading folders…");
        try {
          const url = path ? `/api/filesystem?path=${encodeURIComponent(path)}` : "/api/filesystem";
          const response = await apiFetch(url, { cache: "no-store" });
          if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `HTTP ${response.status}`);
          }
          filesystemState = await response.json();
          setNewSessionStatus("");
          renderFilesystemPicker();
          newSessionStartEl.focus();
        } catch (error) {
          if (error.message !== "HTTP 401") {
            setNewSessionStatus(`Folder load failed: ${error.message}`, true);
          }
        } finally {
          setFilesystemBusy(false);
        }
      }

      async function startNewSession() {
        const current = filesystemState?.current;
        if (!current || creatingSession) {
          return;
        }
        creatingSession = true;
        setFilesystemBusy(true);
        setNewSessionStatus("Starting session…");
        const knownSessionIds = new Set(sessions.map((session) => session.session_id));
        try {
          const response = await apiFetch("/api/server-sessions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ cwd: current.path }),
          });
          if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `HTTP ${response.status}`);
          }
          newSessionModalEl.hidden = true;
          statusEl.textContent = "Starting session…";
          await selectNewlyStartedSession(knownSessionIds);
        } catch (error) {
          if (error.message !== "HTTP 401") {
            setNewSessionStatus(`Start failed: ${error.message}`, true);
          }
        } finally {
          creatingSession = false;
          setFilesystemBusy(false);
        }
      }

      async function selectNewlyStartedSession(knownSessionIds) {
        for (let attempt = 0; attempt < 12; attempt += 1) {
          await sleep(attempt === 0 ? 300 : 1000);
          await refreshSessions();
          const created = sessions
            .filter((session) => !knownSessionIds.has(session.session_id))
            .sort((a, b) => new Date(b.start_time || 0) - new Date(a.start_time || 0))[0];
          if (created) {
            navigateToSession(created.session_id);
            return;
          }
        }
        statusEl.textContent = "Session is starting; refresh will pick it up.";
      }

      /* ---- timestamps ---- */

      const relFmt = new Intl.RelativeTimeFormat(undefined, { numeric: "auto" });

      function formatRelative(value) {
        const date = new Date(value);
        if (!value || Number.isNaN(date.getTime())) {
          return value || "";
        }
        const seconds = Math.round((date.getTime() - Date.now()) / 1000);
        const abs = Math.abs(seconds);
        if (abs < 45) {
          return "just now";
        }
        if (abs < 3600) {
          return relFmt.format(Math.trunc(seconds / 60), "minute");
        }
        if (abs < 86400) {
          return relFmt.format(Math.trunc(seconds / 3600), "hour");
        }
        return relFmt.format(Math.trunc(seconds / 86400), "day");
      }

      function formatAbsolute(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? value || "" : date.toLocaleString();
      }

      function setTimestamp(el, value) {
        el.dataset.ts = value || "";
        el.title = value ? formatAbsolute(value) : "";
        el.textContent = value ? formatRelative(value) : "";
      }

      function refreshTimestamps() {
        for (const el of document.querySelectorAll("[data-ts]")) {
          if (el.dataset.ts) {
            el.textContent = formatRelative(el.dataset.ts);
          }
        }
      }

      /* ---- routing: #/session/<id> drives selection and the phone view ---- */

      function routeSessionId() {
        const match = /^#\/session\/(.+)$/.exec(window.location.hash);
        return match ? decodeURIComponent(match[1]) : null;
      }

      function navigateToSession(sessionId) {
        const target = `#/session/${encodeURIComponent(sessionId)}`;
        if (window.location.hash === target) {
          applyRoute();
        } else {
          window.location.hash = target;
        }
      }

      function navigateToList() {
        window.location.hash = "#/";
      }

      function applyRoute() {
        const routed = routeSessionId();
        if (routed && routed !== selectedSessionId) {
          saveDraftForSelectedSession();
          selectedSessionId = routed;
          queuedPrompts = [];
          pendingNewEntries = 0;
          forceScrollToBottom = true;
          restoreDraftForSelectedSession();
          void refreshQueuedPrompts();
        }
        withViewTransition(() => {
          appEl.classList.toggle("show-chat", routed !== null);
          renderAll();
        });
      }

      function maybeAutoSelectSession() {
        if (routeSessionId() || isNarrowScreen() || !sessions.length) {
          return;
        }
        if (!selectedSessionId || !sessions.some((s) => s.session_id === selectedSessionId)) {
          selectedSessionId = sessions[0].session_id;
          // Reset per-session view state exactly like the route-change
          // path, so the previous session's queue never bleeds through.
          queuedPrompts = [];
          pendingNewEntries = 0;
          forceScrollToBottom = true;
          restoreDraftForSelectedSession();
          void refreshQueuedPrompts();
        }
      }

      /* ---- activity heuristics ---- */

      function transcriptActivitySignature(session) {
        const transcript = Array.isArray(session.transcript) ? session.transcript : [];
        const last = transcript[transcript.length - 1];
        return `${transcript.length}:${last ? entryActivitySignature(last) : ""}`;
      }

      function noteSessionActivity() {
        const now = Date.now();
        const seen = new Set();
        for (const session of sessions) {
          seen.add(session.session_id);
          const sig = transcriptActivitySignature(session);
          const prev = activityBySessionId.get(session.session_id);
          if (!prev) {
            activityBySessionId.set(session.session_id, { sig, at: 0 });
          } else if (prev.sig !== sig) {
            activityBySessionId.set(session.session_id, { sig, at: now });
          }
        }
        for (const id of [...activityBySessionId.keys()]) {
          if (!seen.has(id)) {
            activityBySessionId.delete(id);
          }
        }
      }

      function sessionIsWorking(sessionId) {
        const activity = activityBySessionId.get(sessionId);
        return Boolean(activity) && Date.now() - activity.at < WORKING_WINDOW_MS;
      }

      function sessionLabel(session) {
        return session.name || session.session_id;
      }

      function sessionPendingPermissions(session) {
        return session && Array.isArray(session.pending_permissions) ? session.pending_permissions : [];
      }

      function decisionKey(sessionId, requestId) {
        return `${sessionId}\u001f${requestId}`;
      }

      /* ---- session list (keyed, patched in place) ---- */

      function createSessionCard(sessionId) {
        const root = cloneTemplate(sessionTpl);
        root.dataset.sessionId = sessionId;
        root.addEventListener("click", () => {
          saveDraftForSelectedSession();
          navigateToSession(sessionId);
        });
        return {
          root,
          title: root.querySelector(".session-title"),
          approval: root.querySelector(".session-approval"),
          project: root.querySelector(".session-project"),
          agent: root.querySelector(".session-agent"),
          counts: root.querySelector(".session-counts"),
          updated: root.querySelector(".session-updated"),
        };
      }

      function updateSessionCard(card, session) {
        card.root.classList.toggle("active", session.session_id === selectedSessionId);
        card.root.classList.toggle("working", sessionIsWorking(session.session_id));
        card.title.textContent = sessionLabel(session);
        card.project.textContent = session.project || "-";
        card.agent.textContent = session.agent || "-";
        const queued = session.queued_prompt_count ?? 0;
        card.counts.textContent = `${session.total_messages ?? 0} messages${queued ? ` · ${queued} queued` : ""}`;
        setTimestamp(card.updated, session.last_update || "");
        const needsApproval = sessionPendingPermissions(session).length > 0;
        card.root.classList.toggle("needs-approval", needsApproval);
        card.approval.hidden = !needsApproval;
      }

      function renderSessions() {
        if (!sessions.length) {
          sessionCardById.clear();
          sessionsEl.replaceChildren(emptyNote("No sessions have been published yet."));
          return;
        }
        if (sessionsEl.querySelector(".empty")) {
          sessionsEl.replaceChildren();
        }
        maybeAutoSelectSession();
        const seen = new Set();
        for (const session of sessions) {
          seen.add(session.session_id);
          let card = sessionCardById.get(session.session_id);
          if (!card) {
            card = createSessionCard(session.session_id);
            sessionCardById.set(session.session_id, card);
            sessionsEl.appendChild(card.root);
          }
          updateSessionCard(card, session);
        }
        for (const [id, card] of [...sessionCardById]) {
          if (!seen.has(id)) {
            card.root.remove();
            sessionCardById.delete(id);
          }
        }
        // Only touch DOM order when it actually changed; re-inserting nodes
        // restarts their CSS animations.
        const desired = sessions.map((s) => s.session_id);
        const current = [...sessionsEl.children].map((el) => el.dataset.sessionId);
        if (desired.join("\u001f") !== current.join("\u001f")) {
          for (const id of desired) {
            sessionsEl.appendChild(sessionCardById.get(id).root);
          }
        }
      }

      /* ---- markdown-lite rendering (DOM building only, never innerHTML) ---- */

      // Something with a slash only reads as a path when it carries another
      // path signal (leading marker, depth, or an extension) — this keeps
      // prose like "and/or" plain while catching src/**/*.rs and Cargo.toml.
      function isPathLike(token) {
        return (
          /^[~./]/.test(token) ||
          token.split("/").length > 2 ||
          /\.\w+$/.test(token.replace(/\/$/, ""))
        );
      }

      function appendInline(el, text) {
        const re =
