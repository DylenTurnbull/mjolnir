          /`([^`\n]+)`|\*\*([^*\n]+?)\*\*|\*([^*\s](?:[^*\n]*[^*\s])?)\*|\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)|(https?:\/\/[^\s<>"')\]]+)|((?:~?\/)?(?:[\w.@+*-]+\/)+[\w.@+*-]+\/?|\b[\w@+-]+\.(?:rs|toml|md|json|jsonl|js|mjs|cjs|ts|tsx|jsx|html|css|py|sh|fish|yml|yaml|lock|txt|svg|png|jpe?g|webp|gif|woff2?|ttf|wasm|c|h|hpp|cpp|go|java|kt|rb|sql|proto)\b)/g;
        let last = 0;
        let match;
        while ((match = re.exec(text))) {
          if (match.index > last) {
            el.appendChild(document.createTextNode(text.slice(last, match.index)));
          }
          if (match[1] !== undefined) {
            const code = document.createElement("code");
            code.textContent = match[1];
            el.appendChild(code);
          } else if (match[2] !== undefined) {
            const strong = document.createElement("strong");
            strong.textContent = match[2];
            el.appendChild(strong);
          } else if (match[3] !== undefined) {
            const em = document.createElement("em");
            em.textContent = match[3];
            el.appendChild(em);
          } else if (match[7] !== undefined) {
            if (isPathLike(match[7])) {
              const code = document.createElement("code");
              code.className = "path";
              code.textContent = match[7];
              el.appendChild(code);
            } else {
              el.appendChild(document.createTextNode(match[7]));
            }
          } else {
            const anchor = document.createElement("a");
            anchor.href = match[5] !== undefined ? match[5] : match[6];
            anchor.textContent = match[4] !== undefined ? match[4] : match[6];
            anchor.target = "_blank";
            anchor.rel = "noopener noreferrer";
            el.appendChild(anchor);
          }
          last = match.index + match[0].length;
        }
        if (last < text.length) {
          el.appendChild(document.createTextNode(text.slice(last)));
        }
      }

      function appendToken(el, text, className = "") {
        if (!text) {
          return;
        }
        if (!className) {
          el.appendChild(document.createTextNode(text));
          return;
        }
        const span = document.createElement("span");
        span.className = className;
        span.textContent = text;
        el.appendChild(span);
      }

      function commandShape(text) {
        const titled = /^(Run|Execute|Command)\s+(.+)$/i.exec(text);
        if (titled) {
          return { prefix: `${titled[1]} `, command: stripWholeCommandCode(titled[2]) };
        }
        const prompted = /^((?:[>$]\s+|❯\s+))(.*\S.*)$/.exec(text);
        if (prompted) {
          return { prefix: prompted[1], command: stripWholeCommandCode(prompted[2]) };
        }
        return null;
      }

      function stripWholeCommandCode(command) {
        const trimmed = command.trim();
        if (/^`[^`\n]+`$/.test(trimmed)) {
          return command.replace(trimmed, trimmed.slice(1, -1));
        }
        return command;
      }

      function shellTokens(command) {
        const re = /(\s+|&&|\|\||[|;()<>]+|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`|[^\s|;&()<>]+)/g;
        return command.match(re) || [];
      }

      function isShellWhitespace(token) {
        return /^\s+$/.test(token);
      }

      function isShellOperator(token) {
        return /^(?:&&|\|\||[|;()<>]+)$/.test(token);
      }

      function isEnvAssignment(token) {
        return /^[A-Za-z_][A-Za-z0-9_]*=/.test(token);
      }

      function isShellFlag(token) {
        return /^-{1,2}[A-Za-z0-9][\w-]*(?:=.*)?$/.test(token) || token === "--";
      }

      function isQuotedToken(token) {
        return /^(['"`])[\s\S]*\1$/.test(token);
      }

      function appendCommandTokens(el, command) {
        let expectProgram = true;
        let wordIndex = 0;
        for (const token of shellTokens(command)) {
          if (isShellWhitespace(token)) {
            appendToken(el, token);
            continue;
          }
          if (isShellOperator(token)) {
            appendToken(el, token, "cmd-op");
            if (/^(?:&&|\|\||[|;])$/.test(token)) {
              expectProgram = true;
              wordIndex = 0;
            }
            continue;
          }
          if (expectProgram && isEnvAssignment(token)) {
            appendToken(el, token, "cmd-env");
            continue;
          }
          if (expectProgram) {
            appendToken(el, token, "cmd-program");
            expectProgram = false;
            wordIndex = 1;
            continue;
          }
          if (isShellFlag(token)) {
            appendToken(el, token, "cmd-flag");
          } else if (isQuotedToken(token)) {
            appendToken(el, token, "cmd-string");
          } else if (isPathLike(token)) {
            appendToken(el, token, "cmd-path");
          } else if (wordIndex === 1) {
            appendToken(el, token, "cmd-subcommand");
          } else {
            appendToken(el, token);
          }
          wordIndex += 1;
        }
      }

      function appendMonoInline(el, text) {
        const command = commandShape(text);
        if (!command) {
          appendInline(el, text);
          return;
        }
        appendToken(el, command.prefix, "cmd-prompt");
        appendCommandTokens(el, command.command);
      }

      // Like appendMonoInline, but the caller already knows the line is a shell
      // command (an execute tool's title), so it is tokenized even when the
      // agent sent it bare — no "$"/"❯"/"Run" prefix for commandShape to latch
      // onto. A recognized prefix is still honored when present.
      function appendCommandInline(el, text) {
        const command = commandShape(text);
        if (command) {
          appendToken(el, command.prefix, "cmd-prompt");
          appendCommandTokens(el, command.command);
        } else {
          appendCommandTokens(el, stripWholeCommandCode(text));
        }
      }

      function appendMetaLine(fragment, text) {
        const p = document.createElement("p");
        p.className = "meta-line";
        appendInline(p, text);
        fragment.appendChild(p);
      }

      /* ---- markdown tables ---- */

      function isTableRow(line) {
        const trimmed = line.trim();
        return trimmed.startsWith("|") && trimmed.includes("|", 1);
      }

      function isTableDivider(line) {
        const trimmed = line.trim();
        return /^\|?[\s:|-]+\|?$/.test(trimmed) && trimmed.includes("-");
      }

      function splitTableRow(line) {
        let trimmed = line.trim();
        if (trimmed.startsWith("|")) {
          trimmed = trimmed.slice(1);
        }
        if (trimmed.endsWith("|")) {
          trimmed = trimmed.slice(0, -1);
        }
        return trimmed.split("|").map((cell) => cell.trim());
      }

      // Consume a markdown table starting at lines[start]; returns the index
      // of its last line, or -1 when lines[start] does not open a table.
      function tryAppendTable(fragment, lines, start) {
        if (!isTableRow(lines[start]) || start + 1 >= lines.length || !isTableDivider(lines[start + 1])) {
          return -1;
        }
        let end = start + 1;
        const bodyRows = [];
        while (end + 1 < lines.length && isTableRow(lines[end + 1])) {
          end += 1;
          bodyRows.push(splitTableRow(lines[end]));
        }
        const wrap = document.createElement("div");
        wrap.className = "table-scroll";
        const table = document.createElement("table");
        table.className = "md-table";
        const thead = document.createElement("thead");
        const headRow = document.createElement("tr");
        for (const cell of splitTableRow(lines[start])) {
          const th = document.createElement("th");
          appendInline(th, cell);
          headRow.appendChild(th);
        }
        thead.appendChild(headRow);
        table.appendChild(thead);
        const tbody = document.createElement("tbody");
        for (const cells of bodyRows) {
          const tr = document.createElement("tr");
          for (const cell of cells) {
            const td = document.createElement("td");
            appendInline(td, cell);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
        fragment.appendChild(wrap);
        return end;
      }

      function appendProse(fragment, text) {
        const lines = text.split("\n");
        let paragraph = [];
        let list = null;
        const flushParagraph = () => {
          if (!paragraph.length) {
            return;
          }
          const p = document.createElement("p");
          appendInline(p, paragraph.join("\n"));
          fragment.appendChild(p);
          paragraph = [];
        };
        const flushList = () => {
          if (list) {
            fragment.appendChild(list.el);
            list = null;
          }
        };
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          if (!line.trim()) {
            flushParagraph();
            flushList();
            continue;
          }
          const heading = /^(#{1,6})\s+(.*)$/.exec(line);
          if (heading) {
            flushParagraph();
            flushList();
            const el = document.createElement(`h${Math.min(3 + heading[1].length, 6)}`);
            appendInline(el, heading[2]);
            fragment.appendChild(el);
            continue;
          }
          const meta = /^(?:_([^_]+)_|\*([^*]+)\*)([.!:]?)$/.exec(line.trim());
          if (meta) {
            flushParagraph();
            flushList();
            appendMetaLine(fragment, (meta[1] ?? meta[2]) + meta[3]);
            continue;
          }
          const tableEnd = tryAppendTable(fragment, lines, i);
          if (tableEnd !== -1) {
            flushParagraph();
            flushList();
            i = tableEnd;
            continue;
          }
          const item = /^\s*(?:([-*])|(\d+)[.)])\s+(.*)$/.exec(line);
          if (item) {
            flushParagraph();
            const ordered = item[2] !== undefined;
            if (!list || list.ordered !== ordered) {
              flushList();
              list = { el: document.createElement(ordered ? "ol" : "ul"), ordered };
            }
            const li = document.createElement("li");
            appendInline(li, item[3]);
            list.el.appendChild(li);
            continue;
          }
          flushList();
          paragraph.push(line);
        }
        flushParagraph();
        flushList();
      }

      /* ---- structured blocks: code, JSON, folds ---- */

      const FOLD_LINE_LIMIT = 24;
      const FOLD_CHAR_LIMIT = 4000;

      function tryParseJson(text) {
        try {
          const value = JSON.parse(text);
          return typeof value === "object" && value !== null ? value : undefined;
        } catch {
          return undefined;
        }
      }

      // Tint a pretty-printed JSON string: keys bright, string values muted,
      // numbers and keywords in the single amber accent, punctuation plain.
      function appendJsonTokens(el, pretty) {
        const re = /"(?:[^"\\]|\\.)*"(\s*:)?|-?\b\d+(?:\.\d+)?(?:[eE][+-]?\d+)?\b|\btrue\b|\bfalse\b|\bnull\b/g;
        let last = 0;
        let match;
        while ((match = re.exec(pretty))) {
          if (match.index > last) {
            el.appendChild(document.createTextNode(pretty.slice(last, match.index)));
          }
          const token = match[0];
          const span = document.createElement("span");
          if (token.startsWith('"')) {
            if (match[1]) {
              span.className = "tok-key";
              span.textContent = token.slice(0, token.length - match[1].length);
              el.appendChild(span);
              el.appendChild(document.createTextNode(match[1]));
              last = match.index + token.length;
              continue;
            }
            span.className = "tok-str";
          } else if (token === "true" || token === "false" || token === "null") {
            span.className = "tok-kw";
          } else {
            span.className = "tok-num";
          }
          span.textContent = token;
          el.appendChild(span);
          last = match.index + token.length;
        }
        if (last < pretty.length) {
          el.appendChild(document.createTextNode(pretty.slice(last)));
        }
      }

      /* ---- code tinting: one cached single-pass regex per language family ----
         A linear scan classifies comments, strings, macros/attributes,
         keywords, capitalized type names, call sites, and numbers. Plain
         identifiers and punctuation never match, so untinted runs coalesce
         into large text nodes instead of one node per word. Unknown
         languages render untinted. */

      const CODE_TINT_CHAR_LIMIT = 120000;

      const CODE_LANG_FAMILY = {
        rust: "rust", rs: "rust",
        js: "js", jsx: "js", ts: "js", tsx: "js", mjs: "js", cjs: "js", javascript: "js", typescript: "js",
        python: "python", py: "python", python3: "python",
        shell: "shell", sh: "shell", bash: "shell", zsh: "shell", fish: "shell", shellscript: "shell", console: "shell",
        go: "go", golang: "go",
        c: "c", h: "c", cc: "c", cpp: "c", cxx: "c", hpp: "c",
        java: "java", kt: "java", kotlin: "java",
        ruby: "ruby", rb: "ruby",
        sql: "sql",
        toml: "conf", ini: "conf", yaml: "conf", yml: "conf", conf: "conf", properties: "conf", env: "conf", dockerfile: "conf", makefile: "conf",
        css: "css", scss: "css", less: "css",
        html: "markup", xml: "markup", svg: "markup", vue: "markup",
        diff: "diff", patch: "diff",
      };

      const CODE_FAMILY_SYNTAX = {
        rust: { comments: "slash", chars: true, types: true, calls: true, mac: "#!?\\[[^\\]\\n]*\\]|\\b[a-z_]\\w*!(?!=)", keywords: "as async await break const continue crate dyn else enum extern false fn for if impl in let loop match mod move mut pub ref return self Self static struct super trait true type union unsafe use where while" },
        js: { comments: "slash", templates: true, types: true, calls: true, mac: "@[A-Za-z_][\\w.]*", keywords: "abstract as async await break case catch class const continue debugger declare default delete do else enum export extends false finally for from function if implements import in instanceof interface keyof let namespace new null of readonly return satisfies static super switch this throw true try type typeof undefined var void while with yield" },
        python: { comments: "hash", types: true, calls: true, mac: "^[ \\t]*@[\\w.]+", keywords: "and as assert async await break class continue def del elif else except finally for from global if import in is lambda nonlocal not or pass raise return try while with yield False None True" },
        shell: { comments: "hash", vars: true, keywords: "alias begin break case cd command continue do done echo elif else end esac eval exec exit export fi for function if in local read readonly return select set shift source switch then trap unset until while" },
        go: { comments: "slash", templates: true, types: true, calls: true, keywords: "break case chan const continue default defer else fallthrough false for func go goto if import interface iota map nil package range return select struct switch true type var" },
        c: { comments: "slash", types: true, calls: true, mac: "^[ \\t]*#[ \\t]*\\w+", keywords: "auto bool break case catch char class const constexpr continue default delete do double else enum extern false float for goto if inline int long namespace new nullptr operator private protected public return short signed sizeof static struct switch template this throw true try typedef typename union unsigned using virtual void volatile while" },
        java: { comments: "slash", types: true, calls: true, mac: "@[A-Za-z_][\\w.]*", keywords: "abstract assert boolean break byte case catch char class const continue default do double else enum extends final finally float for fun if implements import instanceof int interface is long native new null object override package private protected public return short static super switch synchronized this throw throws transient true try val var void volatile when while false" },
        ruby: { comments: "hash", types: true, calls: true, mac: "@{1,2}[A-Za-z_]\\w*", keywords: "alias and begin break case class def do else elsif end ensure false for if in module next nil not or redo require rescue retry return self super then true undef unless until when while yield" },
        sql: { comments: "sql", calls: true, flags: "gim", keywords: "add all alter and as asc begin between by case create default delete desc distinct drop else end exists foreign from group having if in index inner insert into is join key left like limit not null offset on or order outer primary references right select set table then union unique update values view when where" },
        conf: { comments: "hash", keys: true },
        css: { comments: "slash", keys: true, calls: true },
        markup: { comments: "markup", tags: true },
        diff: { diff: true },
      };

      const codeTintRegexCache = new Map();

      function codeTintRegex(family) {
        let re = codeTintRegexCache.get(family);
        if (re) {
          return re;
        }
        const syntax = CODE_FAMILY_SYNTAX[family];
        const parts = [];
        if (syntax.diff) {
          parts.push(
            "(?<cmt>^(?:@@|diff|index|---|\\+\\+\\+)[^\\n]*)",
            "(?<ins>^\\+[^\\n]*)",
            "(?<del>^-[^\\n]*)",
          );
        } else {
          if (syntax.comments === "slash") {
            parts.push("(?<cmt>\\/\\/[^\\n]*|\\/\\*[\\s\\S]*?(?:\\*\\/|$))");
          } else if (syntax.comments === "hash") {
            parts.push("(?<cmt>(?<=^|\\s)#[^\\n]*)");
          } else if (syntax.comments === "sql") {
            parts.push("(?<cmt>--[^\\n]*|\\/\\*[\\s\\S]*?(?:\\*\\/|$))");
          } else if (syntax.comments === "markup") {
            parts.push("(?<cmt><!--[\\s\\S]*?(?:-->|$))");
          }
          if (syntax.tags) {
            parts.push("(?<tag><\\/?[A-Za-z][\\w.:-]*|\\/?>)");
          }
          // Rust single quotes are char literals (exactly one char), so
          // lifetimes like <'a, T> don't get eaten as strings.
          const strings = ['"(?:[^"\\\\\\n]|\\\\.)*"?'];
          strings.push(syntax.chars ? "'(?:[^'\\\\\\n]|\\\\.)'" : "'(?:[^'\\\\\\n]|\\\\.)*'?");
          if (syntax.templates) {
            strings.push("`(?:[^`\\\\]|\\\\.)*`?");
          }
          parts.push(`(?<str>${strings.join("|")})`);
          if (syntax.mac) {
            parts.push(`(?<mac>${syntax.mac})`);
          }
          if (syntax.keys) {
            parts.push("(?<key>^[ \\t]*[\\w$.-]+(?=[ \\t]*[:=]))");
          }
          if (syntax.vars) {
            parts.push("(?<vari>\\$(?:\\{[^}\\n]*\\}|\\w+))");
          }
          if (syntax.keywords) {
            parts.push(`(?<kw>\\b(?:${syntax.keywords.split(" ").join("|")})\\b)`);
          }
          if (syntax.types) {
            parts.push("(?<type>\\b[A-Z][A-Za-z0-9_]*\\b)");
          }
          if (syntax.calls) {
            parts.push("(?<fn>\\b[A-Za-z_]\\w*(?=\\s*\\())");
          }
          parts.push("(?<num>\\b\\d[\\w.]*\\b)");
        }
        re = new RegExp(parts.join("|"), syntax.flags || "gm");
        codeTintRegexCache.set(family, re);
        return re;
      }

      function codeTokenClass(groups) {
        if (groups.cmt !== undefined) return "tok-cmt";
        if (groups.str !== undefined) return "tok-str";
        if (groups.mac !== undefined) return "tok-mac";
        if (groups.kw !== undefined) return "tok-kw";
        if (groups.type !== undefined) return "tok-type";
        if (groups.fn !== undefined) return "tok-fn";
        if (groups.key !== undefined || groups.vari !== undefined || groups.tag !== undefined) return "tok-key";
        if (groups.num !== undefined) return "tok-num";
        if (groups.ins !== undefined) return "tok-add";
        if (groups.del !== undefined) return "tok-del";
        return "";
      }

      function appendCodeTokens(el, body, lang) {
        const family = CODE_LANG_FAMILY[lang];
        if (!family || body.length > CODE_TINT_CHAR_LIMIT) {
          el.textContent = body;
          return;
        }
        const re = codeTintRegex(family);
        re.lastIndex = 0;
        let last = 0;
        let match;
        while ((match = re.exec(body))) {
          if (!match[0]) {
            re.lastIndex += 1;
            continue;
          }
          const cls = codeTokenClass(match.groups);
          if (!cls) {
            continue;
          }
          if (match.index > last) {
            el.appendChild(document.createTextNode(body.slice(last, match.index)));
          }
          const span = document.createElement("span");
          span.className = cls;
          span.textContent = match[0];
          el.appendChild(span);
          last = match.index + match[0].length;
        }
        if (last < body.length) {
          el.appendChild(document.createTextNode(body.slice(last)));
        }
      }

      function countLines(text) {
        let count = 1;
        for (let i = text.indexOf("\n"); i !== -1; i = text.indexOf("\n", i + 1)) {
          count += 1;
        }
        return count;
      }

      // Big blocks collapse to a labelled fold so a page of JSON cannot
      // swallow the transcript. Content is built lazily on first open, so a
      // five-thousand-line payload costs no DOM until someone asks for it.
      function foldBlock(label, build) {
        const details = document.createElement("details");
        details.className = "block-fold";
        const summary = document.createElement("summary");
        summary.textContent = label;
        details.appendChild(summary);
        let built = false;
        details.addEventListener("toggle", () => {
          if (details.open && !built) {
            built = true;
            details.appendChild(build());
          }
        });
        return details;
      }

      function jsonBlock(value) {
        const pretty = JSON.stringify(value, null, 2);
        const build = () => {
          const pre = document.createElement("pre");
          pre.className = "code-block";
          pre.dataset.lang = "json";
          const code = document.createElement("code");
          appendJsonTokens(code, pretty);
          pre.appendChild(code);
          return pre;
        };
        const lineCount = countLines(pretty);
        return lineCount > FOLD_LINE_LIMIT ? foldBlock(`json · ${lineCount} lines`, build) : build();
      }

      function codeBlock(body, lang) {
        if (lang === "json" || (!lang && /^\s*[[{]/.test(body))) {
          const parsed = tryParseJson(body);
          if (parsed !== undefined) {
            return jsonBlock(parsed);
          }
        }
        // A fence is code by declaration, so sniffing may accept a weaker
        // signal than the unfenced fold path does.
        const tintLang = lang || detectLang(body, 2);
        const build = () => {
          const pre = document.createElement("pre");
          pre.className = "code-block";
          if (tintLang) {
            pre.dataset.lang = tintLang;
          }
          const code = document.createElement("code");
          appendCodeTokens(code, body, tintLang);
          pre.appendChild(code);
          return pre;
        };
        const lineCount = countLines(body);
        return lineCount > FOLD_LINE_LIMIT ? foldBlock(`${tintLang || "code"} · ${lineCount} lines`, build) : build();
      }

      function inlineTextPre(runLines) {
        const pre = document.createElement("pre");
        pre.className = "entry-text";
        runLines.forEach((runLine, index) => {
          if (index) {
            pre.appendChild(document.createTextNode("\n"));
          }
          appendMonoInline(pre, runLine);
        });
        return pre;
      }

      // A tool title like "Read src/remote.rs" hints at the language of the
      // dump that follows; only extensions with a tint profile count.
      function foldLangHint(line) {
        const match = /[\w~./@-]*\.([A-Za-z][\w+]{0,11})\b/.exec(line);
        const ext = match ? match[1].toLowerCase() : "";
        return CODE_LANG_FAMILY[ext] ? ext : "";
      }

      // Tool results usually arrive as bare unfenced text with no filename
      // in sight, so language has to be sniffed from the content itself.
      // Fingerprints count distinctive constructs over the head of the dump;
      // only a clear multi-hit winner tints — logs and prose stay plain.
      const LANG_FINGERPRINTS = [
        ["diff", /^@@ -\d|^diff --git|^index \w{7}|^--- |^\+\+\+ /gm],
        ["rust", /\bfn \w+|\blet (?:mut )?\w|\bpub (?:fn|struct|enum|trait|mod|use|const|static|async|crate|\w+:)|\bimpl[ <]|\buse \w+::|#!?\[|\.unwrap\(\)|\bSelf\b|&mut |\bmatch \w+[\w.]* \{|\b[a-z_]\w*!\(/g],
        ["python", /\bdef \w+\(|\bimport \w|\bfrom [\w.]+ import |\bself\.\w|\belif |\bexcept[ :]|^[ \t]*@\w|\blambda /gm],
        ["js", /\bconst \w+ *=|\blet \w+ *=|\bvar \w+ *=| => |=>\s*\{|\bfunction[ (]|\bexport (?:default|const|function|class)|\bimport \{|\brequire\(|===|!==|\bawait |\bconsole\.\w/g],
        ["go", /\bfunc \w+\(|\bfunc \(\w| := |^package \w+$|\bfmt\.\w|\bdefer |\bgo func\b|\bchan /gm],
        ["java", /\bpublic (?:class|static|final|void)|\bprivate (?:final )?\w+ \w+|\bSystem\.out|@Override\b|\bthrows \w|\bextends \w+ \{/g],
        ["c", /#include\s*[<"]|\bprintf\s*\(|\bvoid \w+\s*\(|\bint \w+ *[=(;]|\bchar \*|\bsizeof\(|\bstd::|\btemplate *</g],
        ["shell", /(?:^|[|&;] *)(?:cargo|git|npm|pnpm|yarn|sudo|curl|grep|rg|sed|awk|rm|cp|mv|mkdir|echo|cd|ls|cat|tail|head|python3?|node|make|docker|kubectl|ssh|export) |&& |\$\(|\$\{|^#!\//gm],
        ["ruby", /\bdef \w+$|^[ \t]*end$|\bputs |\brequire ["']|\bdo \|\w/gm],
        ["sql", /\bselect .+ from |\binsert into |\bcreate (?:table|index|view)|\bgroup by |\border by |\bleft join |\bwhere \w+ *=/gi],
        ["html", /<\/[a-z][\w-]*>|<[a-z][\w-]* [^<>\n]*>|<!doctype|<!--/gi],
        ["conf", /^\[[\w. -]+\]$|^[\w.-]+ *= [^=\n]/gm],
      ];
      const DETECT_SAMPLE_CHARS = 2500;
      const DETECT_MIN_SCORE = 5;

      function detectLang(text, minScore = DETECT_MIN_SCORE) {
        if (looksLikeDiff(text)) {
          return "diff";
        }
        const sample = text.slice(0, DETECT_SAMPLE_CHARS);
        let best = "";
        let bestScore = 0;
        let runnerUp = 0;
        for (const [lang, re] of LANG_FINGERPRINTS) {
          const score = (sample.match(re) || []).length;
          if (score > bestScore) {
            runnerUp = bestScore;
            bestScore = score;
            best = lang;
          } else if (score > runnerUp) {
            runnerUp = score;
          }
        }
        return bestScore >= minScore && bestScore >= runnerUp * 2 ? best : "";
      }

      function looksLikeDiff(text) {
        return (
          /^(?:diff --git |@@ -\d+(?:,\d+)? \+\d+(?:,\d+)? @@)/m.test(text)
          || (/^--- [^\n]+$/m.test(text) && /^\+\+\+ [^\n]+$/m.test(text))
        );
      }

      function firstDiffLineIndex(lines) {
        return lines.findIndex((line) =>
          /^(?:diff --git |@@ -\d+(?:,\d+)? \+\d+(?:,\d+)? @@|--- |\+\+\+ )/.test(line),
        );
      }

      function appendCodeRun(fragment, body, lang) {
        fragment.appendChild(codeBlock(body.replace(/\n$/, ""), lang));
      }

      // Mono-voice rendering for user/tool/system entries: plain runs keep
      // their whitespace in an .entry-text pre, while structure the runtime
      // actually emits — trailing JSON payloads, _meta_ notes, bare tag
      // lines, markdown tables — gets pulled out and rendered properly.
      function appendMonoText(fragment, text) {
        const lines = text.split("\n");
        let plain = [];
        const flushPlain = () => {
          while (plain.length && !plain[0].trim()) {
            plain.shift();
          }
          while (plain.length && !plain[plain.length - 1].trim()) {
            plain.pop();
          }
          if (!plain.length) {
            return;
          }
          const run = plain;
          plain = [];
          const chars = run.reduce((total, runLine) => total + runLine.length, 0);
          const body = run.join("\n");
          if (looksLikeDiff(body)) {
            const diffStart = firstDiffLineIndex(run);
            if (diffStart > 0) {
              fragment.appendChild(inlineTextPre(run.slice(0, diffStart)));
              appendCodeRun(fragment, run.slice(diffStart).join("\n"), "diff");
            } else {
              appendCodeRun(fragment, body, "diff");
            }
            return;
          }
          if (run.length <= FOLD_LINE_LIMIT && chars <= FOLD_CHAR_LIMIT) {
            fragment.appendChild(inlineTextPre(run));
            return;
          }
          // A dump this big would swallow the transcript: keep the opening
          // line as a visible preview (a tool title, the first line of a
          // paste) and fold the bulk behind a count label.
          const preview = run[0].length > 160 ? `${run[0].slice(0, 160)}…` : run[0];
          fragment.appendChild(inlineTextPre([preview]));
          let start = 1;
          while (start < run.length && !run[start].trim()) {
            start += 1;
          }
          const rest = run.slice(start);
          const foldLines = rest.length ? rest : run;
          const lang = foldLangHint(run[0]) || detectLang(foldLines.slice(0, 80).join("\n"));
          const label = foldLines.length > 1
            ? `${lang || "text"} · ${foldLines.length} lines`
            : `text · ${foldLines[0].length} chars`;
          fragment.appendChild(
            foldBlock(label, () => {
              const pre = document.createElement("pre");
              const body = foldLines.join("\n");
              if (lang) {
                pre.className = "code-block";
                pre.dataset.lang = lang;
                const code = document.createElement("code");
                appendCodeTokens(code, body, lang);
                pre.appendChild(code);
              } else {
                pre.className = "entry-text";
                pre.textContent = body;
              }
              return pre;
            }),
          );
        };
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();
          const meta = /^(?:_([^_]+)_|\*([^*]+)\*)([.!:]?)$/.exec(trimmed);
          if (meta) {
            flushPlain();
            appendMetaLine(fragment, (meta[1] ?? meta[2]) + meta[3]);
            continue;
          }
          // The runtime labels streamed command output with a bare
          // "terminal: <id>" line; render it as a dim annotation.
          if (/^terminal: \S+$/.test(trimmed)) {
            flushPlain();
            appendMetaLine(fragment, trimmed);
            continue;
          }
          if (/^<\/?[A-Za-z][\w:.-]*(\s[^<>]*)?>$/.test(trimmed)) {
            flushPlain();
            appendMetaLine(fragment, trimmed);
            continue;
          }
          const tableEnd = tryAppendTable(fragment, lines, i);
          if (tableEnd !== -1) {
            flushPlain();
            i = tableEnd;
            continue;
          }
          if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
            const tail = tryParseJson(lines.slice(i).join("\n"));
            if (tail !== undefined) {
              flushPlain();
              fragment.appendChild(jsonBlock(tail));
              return;
            }
            const single = tryParseJson(trimmed);
            if (single !== undefined) {
              flushPlain();
              fragment.appendChild(jsonBlock(single));
              continue;
            }
          }
          plain.push(line);
        }
        flushPlain();
      }

      function fenceOpeningLang(line, voice) {
        const re = voice === "mono"
          ? /^```([\w#+./-]*)\s*$/
          : /^ {0,3}```([\w#+./-]*)\s*$/;
        const match = re.exec(line);
        return match ? match[1].toLowerCase() : null;
      }

      function isFenceClose(line, lang, voice) {
        if (voice === "mono" || lang === "diff") {
          return /^```\s*$/.test(line);
        }
        return /^ {0,3}```\s*$/.test(line);
      }

      function nextLineEnd(text, start) {
        const newline = text.indexOf("\n", start);
        return newline === -1 ? text.length : newline + 1;
      }

      function appendTextSegment(fragment, segment, voice) {
        if (!segment) {
          return;
        }
        if (voice === "mono") {
          appendMonoText(fragment, segment);
        } else {
          appendProse(fragment, segment);
        }
      }

      function renderRichText(text, voice = "prose") {
        const fragment = document.createDocumentFragment();
        const source = text || "";
        let chunkStart = 0;
        let lineStart = 0;
        while (lineStart < source.length) {
          const lineEnd = nextLineEnd(source, lineStart);
          const rawLine = source.slice(lineStart, lineEnd);
          const line = rawLine.endsWith("\n") ? rawLine.slice(0, -1) : rawLine;
          const lang = fenceOpeningLang(line, voice);
          if (lang === null) {
            lineStart = lineEnd;
            continue;
          }
          appendTextSegment(fragment, source.slice(chunkStart, lineStart), voice);
          const codeStart = lineEnd;
          let scan = lineEnd;
          let codeEnd = source.length;
          let nextChunkStart = source.length;
          while (scan < source.length) {
            const closeLineEnd = nextLineEnd(source, scan);
            const rawCloseLine = source.slice(scan, closeLineEnd);
            const closeLine = rawCloseLine.endsWith("\n") ? rawCloseLine.slice(0, -1) : rawCloseLine;
            if (isFenceClose(closeLine, lang, voice)) {
              codeEnd = scan;
              nextChunkStart = closeLineEnd;
              break;
            }
            scan = closeLineEnd;
          }
          appendCodeRun(fragment, source.slice(codeStart, codeEnd), lang);
          chunkStart = nextChunkStart;
          lineStart = nextChunkStart;
        }
        appendTextSegment(fragment, source.slice(chunkStart), voice);
        return fragment;
      }

      /* ---- transcript ---- */

      function entryKind(entry) {
        return entry && typeof entry.kind === "string" && entry.kind ? entry.kind : "system";
      }

      function entryLabel(kind) {
        switch (kind) {
          case "user":
            return "User";
          case "agent":
            return "Agent";
          case "thought":
            return "Thought";
          case "tool":
            return "Tool";
          default:
            return "System";
        }
      }

      function legacyToolTextParts(text) {
        const sep = text.indexOf("\n\n");
        return {
          title: sep === -1 ? text : text.slice(0, sep),
          body: sep === -1 ? "" : text.slice(sep + 2),
        };
      }

      function structuredToolTextParts(entry) {
        const text = entry.text || "";
        if (typeof entry.tool_title === "string" || typeof entry.tool_body === "string") {
          return {
            title: typeof entry.tool_title === "string" ? entry.tool_title : "",
            body: typeof entry.tool_body === "string" ? entry.tool_body : "",
          };
        }
        return legacyToolTextParts(text);
      }

      // Execute tool cards carry structured title/body fields when published
      // by current mj builds. Fall back to the old flattened split for stored
      // sessions written before those fields existed.
      function appendExecuteToolBody(body, entry) {
        const parts = structuredToolTextParts(entry);
        const pre = document.createElement("pre");
        pre.className = "entry-text";
        appendCommandInline(pre, parts.title);
        body.appendChild(pre);
        if (parts.body.trim()) {
          body.appendChild(renderRichText(parts.body, "mono"));
        }
      }

      function entryRenderSignature(entry) {
        return [
          entry.text || "",
          entry.tool_kind || "",
          entry.tool_title || "",
          entry.tool_body || "",
        ].join("\u0000");
      }

      function entryActivitySignature(entry) {
        return [
          (entry.text || "").length,
          entry.tool_kind || "",
          (entry.tool_title || "").length,
          (entry.tool_body || "").length,
        ].join(":");
      }

      function setEntryBody(refs, entry) {
        // Streaming updates rewrite the whole body; keep folds the reader
        // opened from snapping shut on every poll.
        const openFolds = [];
        refs.body.querySelectorAll("details.block-fold").forEach((fold, index) => {
          if (fold.open) {
            openFolds.push(index);
          }
        });
        refs.body.replaceChildren();
        const voice = refs.kind === "agent" || refs.kind === "thought" ? "prose" : "mono";
        const text = entry.text || "";
        if (refs.kind === "tool" && entry.tool_kind === "execute" && text.trim()) {
          appendExecuteToolBody(refs.body, entry);
        } else {
          refs.body.appendChild(renderRichText(text, voice));
        }
        if (openFolds.length) {
          const folds = refs.body.querySelectorAll("details.block-fold");
          for (const index of openFolds) {
            if (folds[index]) {
              folds[index].open = true;
            }
          }
        }
      }

      function toolPlaceholderBody(entry) {
        if (entryKind(entry) !== "tool") {
          return null;
        }
        const text = entry.text || "";
        const match = /^tool(?:\n{2,}|$)([\s\S]*)$/.exec(text);
        return match ? match[1] : null;
      }

      function canMergeToolPlaceholder(titleEntry, bodyEntry) {
        const title = titleEntry.text || "";
        return (
          entryKind(titleEntry) === "tool"
          && entryKind(bodyEntry) === "tool"
          && title.trim()
          && title.trim() !== "tool"
          && !title.includes("\n")
          && toolPlaceholderBody(bodyEntry) !== null
        );
      }

      function normalizeTranscript(entries) {
        const out = [];
        for (let i = 0; i < entries.length; i += 1) {
          const current = entries[i];
          const next = entries[i + 1];
          if (next && canMergeToolPlaceholder(current, next)) {
            const body = toolPlaceholderBody(next);
            out.push({
              ...current,
              text: body ? `${current.text || ""}\n\n${body}` : (current.text || ""),
            });
            i += 1;
          } else {
            out.push(current);
          }
        }
        return out;
      }

      function createEntryRefs(entry) {
        const el = cloneTemplate(entryTpl);
        const kind = entryKind(entry);
        el.dataset.kind = kind;
        el.querySelector(".entry-kind").textContent = entryLabel(kind);
        setTimestamp(el.querySelector(".entry-time"), entry.timestamp || "");
        const refs = {
          kind,
          timestamp: entry.timestamp || "",
          text: entry.text || "",
          renderSignature: entryRenderSignature(entry),
          el,
          body: el.querySelector(".entry-body"),
        };
        setEntryBody(refs, entry);
        return refs;
      }

      function isNearTranscriptBottom() {
        const threshold = 48;
        const distanceFromBottom = transcriptEl.scrollHeight - transcriptEl.scrollTop - transcriptEl.clientHeight;
        return distanceFromBottom <= threshold;
      }

      function scrollTranscriptToBottom(behavior = scrollBehavior()) {
        transcriptEl.scrollTo({
          top: transcriptEl.scrollHeight,
          behavior,
        });
        shouldStickToBottom = true;
        jumpToLatestEl.hidden = true;
      }

      function updateJumpToLatestVisibility() {
        const hasOverflow = transcriptEl.scrollHeight > transcriptEl.clientHeight + 8;
        const nearBottom = isNearTranscriptBottom();
        shouldStickToBottom = nearBottom;
        jumpToLatestEl.hidden = !hasOverflow || nearBottom;
        jumpToLatestEl.classList.toggle("has-new", pendingNewEntries > 0);
        jumpToLatestEl.textContent = pendingNewEntries > 0
          ? `Jump to latest (${pendingNewEntries} new)`
          : "Jump to latest";
      }

      function renderTranscript(session) {
        const pinned = forceScrollToBottom || shouldStickToBottom || isNearTranscriptBottom();
        if (!session) {
          renderedSessionId = null;
          renderedEntries = [];
          transcriptTitleEl.textContent = "Transcript";
          transcriptMetaEl.textContent = "Select a session to inspect its history.";
          workingBadgeEl.hidden = true;
          transcriptEl.replaceChildren(
            emptyNote(routeSessionId() ? "This session is not currently connected." : "No transcript available."),
          );
          pendingNewEntries = 0;
          jumpToLatestEl.hidden = true;
          forceScrollToBottom = false;
          return;
        }

        const rawTranscript = Array.isArray(session.transcript) ? session.transcript : [];
        const transcript = normalizeTranscript(rawTranscript);
        transcriptTitleEl.textContent = sessionLabel(session);
        transcriptMetaEl.textContent = `${session.project || "-"} · ${session.agent || "-"} · ${transcript.length} entries`;
        workingBadgeEl.hidden = !sessionIsWorking(session.session_id);

        if (renderedSessionId !== session.session_id) {
          renderedSessionId = session.session_id;
          renderedEntries = [];
          transcriptEl.replaceChildren();
        }
        if (!transcript.length) {
          renderedEntries = [];
          transcriptEl.replaceChildren(emptyNote("This session has not produced any transcript entries yet."));
          pendingNewEntries = 0;
          jumpToLatestEl.hidden = true;
          forceScrollToBottom = false;
          return;
        }
        if (!renderedEntries.length) {
          transcriptEl.replaceChildren();
        }

        // Match the rendered prefix by position. Kind + timestamp identify an
        // entry; the render signature catches streaming text and tool metadata
        // updates without rebuilding stable DOM nodes.
        let matched = 0;
        const limit = Math.min(renderedEntries.length, transcript.length);
        while (matched < limit) {
          const have = renderedEntries[matched];
          const want = transcript[matched];
          if (have.kind !== entryKind(want) || have.timestamp !== (want.timestamp || "")) {
            break;
          }
          matched += 1;
        }
        for (let i = 0; i < matched; i += 1) {
          const have = renderedEntries[i];
          const want = transcript[i];
          const text = want.text || "";
          const renderSignature = entryRenderSignature(want);
          if (have.renderSignature !== renderSignature) {
            have.text = text;
            have.renderSignature = renderSignature;
            setEntryBody(have, want);
          }
        }
        while (renderedEntries.length > matched) {
          renderedEntries.pop().el.remove();
        }
        let appendedCount = 0;
        for (let i = matched; i < transcript.length; i += 1) {
          const refs = createEntryRefs(transcript[i]);
          transcriptEl.appendChild(refs.el);
          renderedEntries.push(refs);
          appendedCount += 1;
        }

        if (pinned) {
          pendingNewEntries = 0;
          scrollTranscriptToBottom(forceScrollToBottom ? "auto" : scrollBehavior());
        } else {
          pendingNewEntries += appendedCount;
          updateJumpToLatestVisibility();
        }
        forceScrollToBottom = false;
      }

      /* ---- queue + composer ---- */

      function saveDraftForSelectedSession() {
        if (selectedSessionId) {
          draftBySessionId.set(selectedSessionId, queueInputEl.value);
        }
      }

      function restoreDraftForSelectedSession() {
        const draft = selectedSessionId ? draftBySessionId.get(selectedSessionId) || "" : "";
        if (queueInputEl.value !== draft) {
          queueInputEl.value = draft;
          syncComposerHeight();
        }
        updateCommandPalette();
      }

      function syncComposerHeight() {
        queueInputEl.style.height = "auto";
        const next = Math.min(queueInputEl.scrollHeight, 200);
        queueInputEl.style.height = `${Math.max(next, 56)}px`;
      }

      function setQueueStatus(text, isError = false) {
        queueStatusEl.textContent = text;
        queueStatusEl.classList.toggle("is-error", isError);
      }

      function sessionCommands(session) {
        return session && Array.isArray(session.available_commands) ? session.available_commands : [];
      }

      function slashCommandQuery(text) {
        if (!text.startsWith("/")) {
          return null;
        }
        const rest = text.slice(1);
        return /\s/.test(rest) ? null : rest.toLowerCase();
      }

      function commandDisplay(command) {
        return `/${command.name || ""}${command.input_hint ? ` <${command.input_hint}>` : ""}`;
      }

      function commandSearchText(command) {
        return [
          command.name || "",
          command.description || "",
          command.input_hint || "",
        ].join("\n").toLowerCase();
      }

      function clearCommandPalette() {
        commandMatches = [];
        commandSelected = 0;
        commandPaletteEl.hidden = true;
        commandPaletteEl.replaceChildren();
      }

      function setCommandSelected(index) {
        if (!commandMatches.length) {
          commandSelected = 0;
          return;
        }
        commandSelected = (index + commandMatches.length) % commandMatches.length;
        [...commandPaletteEl.children].forEach((el, i) => {
          const selected = i === commandSelected;
          el.classList.toggle("is-selected", selected);
          el.setAttribute("aria-selected", selected ? "true" : "false");
          if (selected && el.scrollIntoView) {
            el.scrollIntoView({ block: "nearest" });
          }
        });
      }

      function renderCommandPalette() {
        commandPaletteEl.replaceChildren();
        if (!commandMatches.length) {
          commandPaletteEl.hidden = true;
          return;
        }
        commandPaletteEl.hidden = false;
        commandMatches.forEach((command, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "command-option";
          button.setAttribute("role", "option");
          const name = document.createElement("span");
          name.className = "command-option-name";
          name.textContent = commandDisplay(command);
          const desc = document.createElement("span");
          desc.className = "command-option-desc";
          desc.textContent = command.description || (command.source === "agent" ? "agent command" : "mjolnir command");
          button.append(name, desc);
          button.addEventListener("mouseenter", () => setCommandSelected(index));
          button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            commandSelected = index;
            acceptCommandSelection();
          });
          commandPaletteEl.appendChild(button);
        });
        if (commandSelected >= commandMatches.length) {
          commandSelected = 0;
        }
        setCommandSelected(commandSelected);
      }

      function updateCommandPalette() {
        const session = sessions.find((s) => s.session_id === selectedSessionId) || null;
        const query = slashCommandQuery(queueInputEl.value);
        if (query === null || !session) {
          clearCommandPalette();
          return;
        }
        const commands = sessionCommands(session);
        if (!commands.length) {
          clearCommandPalette();
          return;
        }

        const previous = commandMatches[commandSelected]?.name || "";
        const prefix = commands.filter((command) => (command.name || "").toLowerCase().startsWith(query));
        commandMatches = prefix.length
          ? prefix
          : commands.filter((command) => commandSearchText(command).includes(query));
        commandSelected = commandMatches.findIndex((command) => command.name === previous);
        if (commandSelected < 0) {
          commandSelected = 0;
        }
        renderCommandPalette();
      }

      function moveCommandSelection(delta) {
        if (!commandMatches.length || commandPaletteEl.hidden) {
          return false;
        }
        setCommandSelected(commandSelected + delta);
        return true;
      }

      function acceptCommandSelection() {
        if (!commandMatches.length || commandPaletteEl.hidden) {
          return false;
        }
        const command = commandMatches[commandSelected];
        if (!command?.name) {
          return false;
        }
        queueInputEl.value = `/${command.name} `;
        saveDraftForSelectedSession();
        syncComposerHeight();
        clearCommandPalette();
        queueInputEl.focus();
        return true;
      }

      function markdownForEntry(entry) {
        const kind = entry.kind || "entry";
        if (kind === "tool") {
          const title = entry.tool_title || entry.text || "tool";
          const body = entry.tool_body || entry.text || "";
          return [`### Tool: ${title}`, "", body].join("\n").trim();
        }
        const label = kind === "user" ? "You" : kind === "agent" ? "Agent" : kind;
        return [`### ${label}`, "", entry.text || ""].join("\n").trim();
      }

      function downloadTranscriptMarkdown(session) {
        const transcript = Array.isArray(session?.transcript) ? session.transcript : [];
        const title = sessionLabel(session || {}) || "mjolnir session";
        const body = [
          `# ${title}`,
          "",
          `${session?.project || "-"} · ${session?.agent || "-"}`,
          "",
          ...transcript.map(markdownForEntry).filter(Boolean),
          "",
        ].join("\n");
        const blob = new Blob([body], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const safeName = (title || "mjolnir-session").toLowerCase().replace(/[^a-z0-9._-]+/g, "-").replace(/^-|-$/g, "") || "mjolnir-session";
        link.href = url;
        link.download = `${safeName}.md`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function consumeLocalSlashCommand(session, text) {
        const trimmed = text.trim();
        if (trimmed === "/new") {
          openNewSessionPicker();
        } else if (trimmed === "/mjconfig") {
          if (!session) {
            return false;
          }
          const target = sessionConfigEl.querySelector("button, input, select");
          if (target) {
            target.focus();
            sessionConfigEl.scrollIntoView({ block: "nearest" });
          } else {
            setQueueStatus("No session config controls are available.", true);
          }
        } else if (trimmed === "/export") {
          if (!session) {
            return false;
          }
          downloadTranscriptMarkdown(session);
          setQueueStatus("Transcript exported.");
        } else {
          return false;
        }
        queueInputEl.value = "";
        if (selectedSessionId) {
          draftBySessionId.set(selectedSessionId, "");
        }
        syncComposerHeight();
        clearCommandPalette();
        return true;
      }

      function renderQueue(session) {
        queueListEl.replaceChildren();
        queueInputEl.disabled = !session;
        queueSubmitEl.disabled = !session;

        if (!session) {
          setQueueStatus("Select a session.");
          clearCommandPalette();
          return;
        }

        // The placeholder explains queueing; the strip only reports depth.
        setQueueStatus(queuedPrompts.length ? `${queuedPrompts.length} queued` : "");

        for (const prompt of queuedPrompts) {
          const item = cloneTemplate(queueTpl);
          setTimestamp(item.querySelector(".queue-item-time"), prompt.created_at || "");
          item.querySelector(".queue-item-text").textContent = prompt.text || "";
          queueListEl.appendChild(item);
        }
      }

      function renderPermissions(session) {
        permissionsEl.replaceChildren();
        const pending = sessionPendingPermissions(session);
        // Forget sent decisions once their request leaves the snapshot.
        if (session) {
          for (const key of [...sentDecisions]) {
            if (
              key.startsWith(`${session.session_id}\u001f`)
              && !pending.some((request) => decisionKey(session.session_id, request.request_id) === key)
            ) {
              sentDecisions.delete(key);
            }
          }
        }
        approvalBadgeEl.hidden = !pending.length;
        if (pending.length) {
          workingBadgeEl.hidden = true;
        }
        for (const request of pending) {
          const card = cloneTemplate(permissionTpl);
          card.querySelector(".permission-title").textContent = request.title || request.request_id;
          setTimestamp(card.querySelector(".permission-time"), request.requested_at || "");
          const optionsEl = card.querySelector(".permission-options");
          const sent = sentDecisions.has(decisionKey(session.session_id, request.request_id));
          for (const option of request.options || []) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "permission-option";
            button.dataset.kind = option.kind || "other";
            button.textContent = option.label || option.option_id;
            button.disabled = sent;
            button.addEventListener("click", () => {
              void submitPermissionDecision(session.session_id, request.request_id, option.option_id);
            });
            optionsEl.appendChild(button);
          }
          card.querySelector(".permission-status").textContent = sent
            ? "Decision sent — waiting for the session to apply it…"
            : "";
          permissionsEl.appendChild(card);
        }
      }

      async function submitPermissionDecision(sessionId, requestId, optionId) {
        const key = decisionKey(sessionId, requestId);
        if (sentDecisions.has(key)) {
          return;
        }
        sentDecisions.add(key);
        renderChat();
        try {
          const response = await apiFetch("/api/permission-decisions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              session_id: sessionId,
              request_id: requestId,
              option_id: optionId,
            }),
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
        } catch (error) {
          sentDecisions.delete(key);
          if (error.message !== "HTTP 401") {
            setQueueStatus(`Decision failed: ${error.message}`, true);
          }
          renderChat();
        }
      }

      function sessionConfigOptions(session) {
        return session && Array.isArray(session.session_config) ? session.session_config : [];
      }

      function configOptionKey(option) {
        return `${option.target_kind}\u001f${option.config_id || ""}`;
      }

      function configChangeKey(sessionId, option) {
        return `${sessionId}\u001f${configOptionKey(option)}`;
      }

      // A searchable single-select dropdown built from scratch so it stays
      // usable with long option lists (e.g. model pickers) and matches the app
      // styling. `key` ties it to its sent-change entry; `onSelect(value)` fires
      // only when the user picks a different value. The renderer reuses one
      // instance across polls via the returned controller.
      function createCombobox(option, key, onSelect) {
        let choices = option.choices || [];
        let value = currentComboValue(option, key);
        let open = false;
        let filtered = choices.slice();
        let activeIndex = -1;

        const root = document.createElement("div");
        root.className = "config-combo";

        const trigger = document.createElement("button");
        trigger.type = "button";
        trigger.className = "config-combo-trigger";
        trigger.setAttribute("aria-haspopup", "listbox");
        trigger.setAttribute("aria-expanded", "false");
        const valueEl = document.createElement("span");
        valueEl.className = "config-combo-value";
        const chevron = document.createElement("span");
        chevron.className = "config-combo-chevron";
        chevron.setAttribute("aria-hidden", "true");
        trigger.append(valueEl, chevron);

        const popup = document.createElement("div");
        popup.className = "config-combo-popup";
        popup.hidden = true;
        const search = document.createElement("input");
        search.type = "text";
        search.className = "config-combo-search";
        search.placeholder = "Search…";
        search.setAttribute("aria-label", "Search options");
        const list = document.createElement("ul");
        list.className = "config-combo-list";
        list.setAttribute("role", "listbox");
        popup.append(search, list);
        root.append(trigger, popup);

        function labelFor(val) {
          const choice = choices.find((c) => c.value === val);
          return choice ? choice.label || choice.value : val || "—";
        }

        function renderValue() {
          valueEl.textContent = labelFor(value);
        }

        function renderList() {
          const q = search.value.trim().toLowerCase();
          filtered = choices.filter((c) => {
            if (!q) return true;
            return (
              (c.label || "").toLowerCase().includes(q)
              || (c.value || "").toLowerCase().includes(q)
              || (c.description || "").toLowerCase().includes(q)
            );
          });
          list.replaceChildren();
          if (!filtered.length) {
            const empty = document.createElement("li");
            empty.className = "config-combo-empty";
            empty.textContent = "No matches";
            list.appendChild(empty);
            return;
          }
          filtered.forEach((choice, index) => {
            const item = document.createElement("li");
            item.className = "config-combo-option";
            item.setAttribute("role", "option");
            if (choice.value === value) {
              item.classList.add("is-selected");
              item.setAttribute("aria-selected", "true");
            }
            if (index === activeIndex) {
              item.classList.add("is-active");
            }
            const label = document.createElement("span");
            label.className = "config-combo-option-label";
            label.textContent = choice.label || choice.value;
            item.appendChild(label);
            if (choice.description) {
              const desc = document.createElement("span");
              desc.className = "config-combo-option-desc";
              desc.textContent = choice.description;
              item.appendChild(desc);
            }
            // mousedown (not click) so the choice lands before the search
            // input's blur can close the popup out from under it.
            item.addEventListener("mousedown", (event) => {
              event.preventDefault();
              choose(choice.value);
            });
            item.addEventListener("mousemove", () => setActive(index));
            list.appendChild(item);
          });
        }

        function updateSearchMode() {
          popup.classList.toggle(
            "is-searching",
            isNarrowScreen()
              && open
              && (document.activeElement === search || search.value.trim().length > 0),
          );
        }

        function setActive(index) {
          activeIndex = index;
          [...list.children].forEach((el, i) => {
            el.classList.toggle("is-active", i === activeIndex);
          });
          const active = list.children[activeIndex];
          if (active && active.scrollIntoView) {
            active.scrollIntoView({ block: "nearest" });
          }
        }

        function onOutsidePointer(event) {
          if (!root.contains(event.target)) closePopup();
        }

        function openPopup() {
          if (open || trigger.disabled) return;
          open = true;
          popup.hidden = false;
          trigger.setAttribute("aria-expanded", "true");
          search.value = "";
          activeIndex = -1;
          renderList();
          const selected = filtered.findIndex((c) => c.value === value);
          if (selected >= 0) setActive(selected);
          if (!isNarrowScreen()) {
            search.focus();
          }
          updateSearchMode();
          document.addEventListener("pointerdown", onOutsidePointer, true);
        }

        function closePopup() {
          if (!open) return;
          open = false;
          popup.hidden = true;
          trigger.setAttribute("aria-expanded", "false");
          if (document.activeElement === search) {
            search.blur();
          }
          popup.classList.remove("is-searching");
          renderValue();
          document.removeEventListener("pointerdown", onOutsidePointer, true);
        }

        function choose(val) {
          closePopup();
          if (val !== value) onSelect(val);
        }

        trigger.addEventListener("click", () => (open ? closePopup() : openPopup()));
        search.addEventListener("focus", () => {
          syncKeyboardInset();
          updateSearchMode();
        });
        search.addEventListener("click", () => {
          setTimeout(updateSearchMode, 0);
        });
        search.addEventListener("blur", () => {
          setTimeout(updateSearchMode, 0);
        });
        search.addEventListener("input", () => {
          activeIndex = -1;
          renderList();
          if (filtered.length) setActive(0);
          updateSearchMode();
        });
        search.addEventListener("keydown", (event) => {
          if (event.key === "ArrowDown") {
            event.preventDefault();
            if (filtered.length) setActive((activeIndex + 1) % filtered.length);
          } else if (event.key === "ArrowUp") {
            event.preventDefault();
            if (filtered.length) setActive((activeIndex - 1 + filtered.length) % filtered.length);
          } else if (event.key === "Enter") {
            event.preventDefault();
            if (activeIndex >= 0 && filtered[activeIndex]) choose(filtered[activeIndex].value);
          } else if (event.key === "Escape") {
            event.preventDefault();
            closePopup();
            trigger.focus();
          }
        });

        renderValue();

        return {
          element: root,
          isOpen: () => open,
          // Background polls refresh data, but never while the popup is open —
          // that would yank the list and search box out from under the user.
          // The new value/choices take effect on the next close instead.
          update(nextOption) {
            choices = nextOption.choices || [];
            value = currentComboValue(nextOption, key);
            const disabled = sentConfigChanges.has(key);
            trigger.disabled = disabled;
            if (disabled) closePopup();
            if (!open) renderValue();
          },
        };
      }

      // The value a combo should display: the optimistic sent value while a
      // change is in flight, otherwise whatever the snapshot reports.
      function currentComboValue(option, key) {
        const sent = sentConfigChanges.get(key);
        return sent ? sent.value : option.current_value || "";
      }

      function renderConfig(session) {
        const options = sessionConfigOptions(session);
        // Forget sent changes the session has applied (current_value caught
        // up), that vanished from the snapshot, or that timed out waiting to
        // apply, so the control re-enables.
        if (session) {
          for (const [key, sent] of [...sentConfigChanges.entries()]) {
            if (!key.startsWith(`${session.session_id}\u001f`)) {
              continue;
            }
            const match = options.find(
              (option) => configChangeKey(session.session_id, option) === key,
            );
            if (
              !match
              || match.current_value === sent.value
              || Date.now() - sent.sentAt > CONFIG_APPLY_TIMEOUT_MS
            ) {
              sentConfigChanges.delete(key);
            }
          }
        }
        const desiredKeys = session
          ? options.map((option) => configChangeKey(session.session_id, option))
          : [];
        const currentKeys = [...configCombos.keys()];
        const sameStructure =
          !!session
          && currentKeys.length === desiredKeys.length
          && currentKeys.every((key, index) => key === desiredKeys[index]);

        if (!sameStructure) {
          sessionConfigEl.replaceChildren();
          configCombos.clear();
          if (!session) return;
          for (const option of options) {
            const key = configChangeKey(session.session_id, option);
            const row = cloneTemplate(configOptionTpl);
            row.querySelector(".config-option-name").textContent =
              option.name || option.config_id || "";
            const statusEl = row.querySelector(".config-option-status");
            const combo = createCombobox(option, key, (value) => {
              void submitConfigChange(session.session_id, option, value);
            });
            row.insertBefore(combo.element, statusEl);
            const entry = { combo, statusEl };
            configCombos.set(key, entry);
            applyConfigComboState(entry, key, option);
            sessionConfigEl.appendChild(row);
          }
          return;
        }

        // Same option set as last render: patch the existing combos in place so
        // an open dropdown or in-flight selection survives the poll refresh.
        for (const option of options) {
          const key = configChangeKey(session.session_id, option);
          const entry = configCombos.get(key);
          if (entry) applyConfigComboState(entry, key, option);
        }
      }

      function applyConfigComboState(entry, key, option) {
        const applying = sentConfigChanges.has(key);
        entry.combo.update(option);
        entry.statusEl.textContent = applying ? "applying…" : "";
      }

      async function submitConfigChange(sessionId, option, value) {
        const key = configChangeKey(sessionId, option);
        if (sentConfigChanges.get(key)?.value === value) {
          return;
        }
        sentConfigChanges.set(key, { value, sentAt: Date.now() });
        renderChat();
        try {
          const response = await apiFetch("/api/config-changes", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              session_id: sessionId,
              target_kind: option.target_kind,
              config_id: option.config_id ?? null,
              value,
            }),
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
        } catch (error) {
          sentConfigChanges.delete(key);
          if (error.message !== "HTTP 401") {
            setQueueStatus(`Config change failed: ${error.message}`, true);
          }
          renderChat();
        }
      }

      function renderChat() {
        const session = sessions.find((s) => s.session_id === selectedSessionId) || null;
        renderTranscript(session);
        renderConfig(session);
        renderPermissions(session);
        renderQueue(session);
        updateCommandPalette();
      }

      function renderAll() {
        renderSessions();
        renderChat();
      }

      /* ---- network ---- */

      async function tryResumeViewerSession() {
        if (viewerToken) {
          showApp();
          await refreshSessions();
          applyRoute();
          return;
        }
        try {
          const response = await fetch("/live/sessions", {
            credentials: "same-origin",
            cache: "no-store",
          });
          if (response.status === 401) {
            showAuth();
            authTokenEl.focus();
            return;
          }
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          sessions = await response.json();
          noteSessionActivity();
          showApp();
          statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
          applyRoute();
          await refreshQueuedPrompts();
        } catch (error) {
          showAuth(`Sign-in check failed: ${error.message}`);
          authTokenEl.focus();
        }
      }

      async function refreshSessions() {
        if (!authenticated) {
          return;
        }
        try {
          const response = await apiFetch("/live/sessions", {
            cache: "no-store",
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          sessions = await response.json();
          noteSessionActivity();
          statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
          renderAll();
          refreshTimestamps();
          await refreshQueuedPrompts();
        } catch (error) {
          if (error.message !== "HTTP 401") {
            statusEl.textContent = `Update failed: ${error.message}`;
          }
        }
      }

      async function refreshQueuedPrompts() {
        if (!authenticated) {
          return;
        }
        const sessionId = selectedSessionId;
        if (!sessionId) {
          queuedPrompts = [];
          renderQueue(null);
          return;
        }
        try {
          const response = await apiFetch(`/api/queued-prompts?session_id=${encodeURIComponent(sessionId)}`, {
            cache: "no-store",
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          queuedPrompts = await response.json();
          const selected = sessions.find((session) => session.session_id === selectedSessionId) || null;
          renderQueue(selected);
        } catch (error) {
          if (error.message !== "HTTP 401") {
            setQueueStatus(`Queue update failed: ${error.message}`, true);
          }
        }
      }

      async function submitQueuedPrompt() {
        const sessionId = selectedSessionId;
        const text = queueInputEl.value;
        if (!sessionId || !text.trim()) {
          return;
        }
        const session = sessions.find((s) => s.session_id === selectedSessionId) || null;
        if (consumeLocalSlashCommand(session, text)) {
          return;
        }
        queueSubmitEl.disabled = true;
        try {
          const response = await apiFetch("/api/queued-prompts", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              session_id: sessionId,
              text,
            }),
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          queueInputEl.value = "";
          draftBySessionId.set(sessionId, "");
          clearCommandPalette();
          syncComposerHeight();
          pendingNewEntries = 0;
          forceScrollToBottom = true;
          await refreshSessions();
        } catch (error) {
          if (error.message !== "HTTP 401") {
            setQueueStatus(`Queue submit failed: ${error.message}`, true);
          }
        } finally {
          queueSubmitEl.disabled = !selectedSessionId;
        }
      }

      async function submitAuth(event) {
        event.preventDefault();
        const code = authTokenEl.value;
        if (!code.trim()) {
          authErrorEl.textContent = "Enter the six-digit viewer code from mj server.";
          return;
        }
        authSubmitEl.disabled = true;
        authErrorEl.textContent = "";
        try {
          const response = await fetch("/auth/session", {
            method: "POST",
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ code }),
          });
          if (response.status === 401) {
            authErrorEl.textContent = "That viewer code was rejected.";
            return;
          }
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          authTokenEl.value = "";
          showApp();
          await refreshSessions();
          applyRoute();
        } catch (error) {
          authErrorEl.textContent = `Sign-in failed: ${error.message}`;
        } finally {
          authSubmitEl.disabled = false;
        }
      }

      async function logout() {
        try {
          await fetch("/auth/session", {
            method: "DELETE",
            credentials: "same-origin",
          });
        } finally {
          showAuth("Logged out.");
        }
      }

      /* ---- wiring ---- */

      themeToggleEl.addEventListener("click", () => {
        setTheme(currentTheme() === "light" ? "dark" : "light");
      });
      authFormEl.addEventListener("submit", submitAuth);
      logoutButtonEl.addEventListener("click", logout);
      newSessionButtonEl.addEventListener("click", openNewSessionPicker);
      newSessionCloseEl.addEventListener("click", closeNewSessionPicker);
      newSessionStartEl.addEventListener("click", startNewSession);
      newSessionModalEl.addEventListener("click", (event) => {
        if (event.target === newSessionModalEl) {
          closeNewSessionPicker();
        }
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !newSessionModalEl.hidden) {
          event.preventDefault();
          closeNewSessionPicker();
        }
      });
      backButtonEl.addEventListener("click", navigateToList);
      window.addEventListener("hashchange", applyRoute);
      narrowScreen.addEventListener("change", () => {
        if (authenticated) {
          renderAll();
        }
      });
      window.addEventListener("resize", syncKeyboardInset);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncKeyboardInset);
        window.visualViewport.addEventListener("scroll", syncKeyboardInset);
      }
      jumpToLatestEl.addEventListener("click", () => {
        pendingNewEntries = 0;
        scrollTranscriptToBottom();
      });
      transcriptEl.addEventListener("scroll", () => {
        if (isNearTranscriptBottom()) {
          pendingNewEntries = 0;
        }
        updateJumpToLatestVisibility();
      }, { passive: true });
      queueSubmitEl.addEventListener("click", submitQueuedPrompt);
      queueInputEl.addEventListener("input", () => {
        saveDraftForSelectedSession();
        syncComposerHeight();
        updateCommandPalette();
      });
      queueInputEl.addEventListener("keydown", (event) => {
        if (!commandPaletteEl.hidden) {
          if (event.key === "ArrowDown") {
            event.preventDefault();
            moveCommandSelection(1);
            return;
          }
          if (event.key === "ArrowUp") {
            event.preventDefault();
            moveCommandSelection(-1);
            return;
          }
          if (event.key === "Tab") {
            event.preventDefault();
            acceptCommandSelection();
            return;
          }
          if (event.key === "Enter" && !event.shiftKey && !event.metaKey && !event.ctrlKey && !event.altKey) {
            event.preventDefault();
            acceptCommandSelection();
            return;
          }
          if (event.key === "Escape") {
            event.preventDefault();
            clearCommandPalette();
            return;
          }
        }
        if (event.key === "Enter" && !event.shiftKey && !event.metaKey && !event.ctrlKey && !event.altKey) {
          event.preventDefault();
          submitQueuedPrompt();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          submitQueuedPrompt();
        }
      });

      applyTheme(currentTheme());
      syncComposerHeight();
      syncKeyboardInset();
      applyRoute();
      void tryResumeViewerSession();
    </script>
    <script>
      // Register the service worker so the app is installable and can launch
      // offline. Registration requires a trusted TLS certificate; if it fails
      // (e.g. a click-through self-signed cert) the app keeps working normally —
      // it just isn't installable. Kept out of the main module so a failure here
      // can never break the app.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch((error) => {
            console.warn("Service worker registration failed:", error);
          });
        });
      }
    </script>
