[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-linux-android",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[licenses]
# Dependencies are denied unless at least one branch of their SPDX expression
# can be satisfied by this reviewed permissive list. Reciprocal and project
# licenses stay scoped to named exceptions below.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
include-build = true
include-dev = false
unused-allowed-license = "allow"
exceptions = [
    # Workspace packages are the GPL-covered project, not generally allowed
    # third-party dependencies.
    { crate = "brokk-mjolnir", allow = ["GPL-3.0-only"] },
    { crate = "brokk-mj-voice-worker", allow = ["GPL-3.0-only"] },
    # MPL applies at file scope. Keep it limited to the reviewed crate.
    { crate = "option-ext@0.2.0", allow = ["MPL-2.0"] },
    # The bzip2/libbzip2 1.0.6 terms are permissive but use a non-SPDX id.
    { crate = "libbz2-rs-sys@0.2.5", allow = ["bzip2-1.0.6"] },
]
