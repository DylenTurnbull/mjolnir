# Union of the native targets used by the GitHub release workflow. The Android
# archive does not include the voice worker, but retaining the full workspace
# here is conservative and keeps target-specific dependencies visible.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-linux-android",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# ureq is dual-licensed and cargo-about can otherwise choose a different
# accepted license file on different platforms.
[ureq.clarify]
license = "Apache-2.0"

[[ureq.clarify.files]]
path = "LICENSE-APACHE"
license = "Apache-2.0"
