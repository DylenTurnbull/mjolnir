name: Publish to crates.io

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --assume-yes libasound2-dev

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "brokk-mjolnir" or .name == "brokk-mj-voice-worker") | [.name, .version] | @tsv' \
            | while IFS=$'\t' read -r crate version; do
                if [ "$tag" != "$version" ]; then
                  echo "Tag version ($tag) does not match $crate version ($version)" >&2
                  exit 1
                fi
              done

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish voice worker
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p brokk-mj-voice-worker

      - name: Publish mjolnir
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p brokk-mjolnir
