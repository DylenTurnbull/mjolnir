name: GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Package archive
        shell: bash
        run: |
          name="brokk-mjolnir-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          mkdir "$name"
          cp "target/x86_64-unknown-linux-gnu/release/mj" "$name/"
          cp README.md LICENSE "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: x86_64-unknown-linux-gnu
          path: |
            brokk-mjolnir-*.tar.gz
            brokk-mjolnir-*.tar.gz.sha256
          if-no-files-found: error

  build-linux-arm64:
    name: Build aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: cross build --release --locked --target aarch64-unknown-linux-gnu

      - name: Package archive
        shell: bash
        run: |
          name="brokk-mjolnir-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu"
          mkdir "$name"
          cp "target/aarch64-unknown-linux-gnu/release/mj" "$name/"
          cp README.md LICENSE "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aarch64-unknown-linux-gnu
          path: |
            brokk-mjolnir-*.tar.gz
            brokk-mjolnir-*.tar.gz.sha256
          if-no-files-found: error

  build-windows:
    name: Build x86_64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Package archive
        shell: pwsh
        run: |
          $name = "brokk-mjolnir-${env:GITHUB_REF_NAME}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\mj.exe" -Destination $name
          Copy-Item "README.md" -Destination $name
          Copy-Item "LICENSE" -Destination $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$name.zip").Hash.ToLower()
          "$hash  $name.zip" | Set-Content -Path "$name.zip.sha256" -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: x86_64-pc-windows-msvc
          path: |
            brokk-mjolnir-*.zip
            brokk-mjolnir-*.zip.sha256
          if-no-files-found: error

  build-macos:
    name: Build macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64 binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Build aarch64 binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/mj \
            target/aarch64-apple-darwin/release/mj \
            -output target/universal-apple-darwin/release/mj
          lipo -info target/universal-apple-darwin/release/mj

      - name: Package archive
        run: |
          name="brokk-mjolnir-${GITHUB_REF_NAME}-universal-apple-darwin"
          mkdir "$name"
          cp target/universal-apple-darwin/release/mj "$name/"
          cp README.md LICENSE "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: universal-apple-darwin
          path: |
            brokk-mjolnir-*.tar.gz
            brokk-mjolnir-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/brokk-mjolnir-*.tar.gz
            artifacts/brokk-mjolnir-*.tar.gz.sha256
            artifacts/brokk-mjolnir-*.zip
            artifacts/brokk-mjolnir-*.zip.sha256
