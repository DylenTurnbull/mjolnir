name: GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  ANVIL_VERSION: "0.22.0"

jobs:
  build-linux:
    name: Build x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --assume-yes libasound2-dev

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Build voice worker
        run: cargo build --release --locked -p brokk-mj-voice-worker --target x86_64-unknown-linux-gnu

      - name: Download pinned Anvil
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="brokk-anvil-v${ANVIL_VERSION}-x86_64-unknown-linux-gnu.zip"
          gh release download "v${ANVIL_VERSION}" --repo BrokkAi/anvil --pattern "$asset" --pattern "$asset.sha256"
          sha256sum -c "$asset.sha256"
          unzip -j "$asset" '*/anvil' -d target/x86_64-unknown-linux-gnu/release

      - name: Package archive
        shell: bash
        run: |
          name="brokk-mjolnir-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          mkdir "$name"
          cp "target/x86_64-unknown-linux-gnu/release/mj" "$name/"
          cp "target/x86_64-unknown-linux-gnu/release/mj-voice-worker" "$name/"
          cp "target/x86_64-unknown-linux-gnu/release/anvil" "$name/"
          cp README.md LICENSE "$name/"
          mkdir "$name/licenses"
          cp licenses/SOURCE.md licenses/OFL-1.1.md licenses/THIRD_PARTY_LICENSES.html licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "$name/licenses/"
          cp -R licenses/native "$name/licenses/"
          cp -R "licenses/anvil-v${ANVIL_VERSION}" "$name/anvil-licenses"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: x86_64-unknown-linux-gnu
          path: |
            brokk-mjolnir-*.tar.gz
            brokk-mjolnir-*.tar.gz.sha256
          if-no-files-found: error

  build-linux-arm64:
    name: Build aarch64-unknown-linux-gnu
    # Build natively on a GitHub-hosted arm64 runner instead of cross. The
    # cross images (ghcr.io/cross-rs/aarch64-unknown-linux-gnu, Ubuntu 20.04 /
    # GCC 9 even on the main tag) ship a libstdc++ too old to link the
    # GCC 11+ symbols in the prebuilt sherpa-onnx aarch64 static libs
    # (std::__throw_bad_array_new_length, std::__cxx11::basic_stringstream,
    # std::filesystem::path). ubuntu-24.04-arm ships GCC 13, matching the
    # native build path that already succeeds on x86_64.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Linux audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --assume-yes libasound2-dev

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Build voice worker
        run: cargo build --release --locked -p brokk-mj-voice-worker --target aarch64-unknown-linux-gnu

      - name: Download pinned Anvil
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="brokk-anvil-v${ANVIL_VERSION}-aarch64-unknown-linux-gnu.zip"
          gh release download "v${ANVIL_VERSION}" --repo BrokkAi/anvil --pattern "$asset" --pattern "$asset.sha256"
          sha256sum -c "$asset.sha256"
          unzip -j "$asset" '*/anvil' -d target/aarch64-unknown-linux-gnu/release

      - name: Package archive
        shell: bash
        run: |
          name="brokk-mjolnir-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu"
          mkdir "$name"
          cp "target/aarch64-unknown-linux-gnu/release/mj" "$name/"
          cp "target/aarch64-unknown-linux-gnu/release/mj-voice-worker" "$name/"
          cp "target/aarch64-unknown-linux-gnu/release/anvil" "$name/"
          cp README.md LICENSE "$name/"
          mkdir "$name/licenses"
          cp licenses/SOURCE.md licenses/OFL-1.1.md licenses/THIRD_PARTY_LICENSES.html licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "$name/licenses/"
          cp -R licenses/native "$name/licenses/"
          cp -R "licenses/anvil-v${ANVIL_VERSION}" "$name/anvil-licenses"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aarch64-unknown-linux-gnu
          path: |
            brokk-mjolnir-*.tar.gz
            brokk-mjolnir-*.tar.gz.sha256
          if-no-files-found: error

  build-android:
    name: Build aarch64-linux-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Export Android NDK toolchain
        shell: bash
        run: |
          ndk_path='${{ steps.setup-ndk.outputs.ndk-path }}'
          echo "ANDROID_NDK_HOME=$ndk_path" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_path" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target aarch64-linux-android

      - name: Download pinned Anvil
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="brokk-anvil-v${ANVIL_VERSION}-aarch64-linux-android.zip"
          gh release download "v${ANVIL_VERSION}" --repo BrokkAi/anvil --pattern "$asset" --pattern "$asset.sha256"
          sha256sum -c "$asset.sha256"
          unzip -j "$asset" '*/anvil' -d target/aarch64-linux-android/release

      - name: Package archive
        shell: bash
        run: |
          name="brokk-mjolnir-${GITHUB_REF_NAME}-aarch64-linux-android"
          mkdir "$name"
          cp "target/aarch64-linux-android/release/mj" "$name/"
          cp "target/aarch64-linux-android/release/anvil" "$name/"
          cp README.md LICENSE "$name/"
          mkdir "$name/licenses"
          cp licenses/SOURCE.md licenses/OFL-1.1.md licenses/THIRD_PARTY_LICENSES.html licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "$name/licenses/"
          cp -R licenses/native "$name/licenses/"
          cp -R "licenses/anvil-v${ANVIL_VERSION}" "$name/anvil-licenses"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aarch64-linux-android
          path: |
            brokk-mjolnir-*.tar.gz
            brokk-mjolnir-*.tar.gz.sha256
          if-no-files-found: error

  build-windows:
    name: Build x86_64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Build voice worker
        run: cargo build --release --locked -p brokk-mj-voice-worker --target x86_64-pc-windows-msvc

      - name: Download pinned Anvil
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = "brokk-anvil-v${env:ANVIL_VERSION}-x86_64-pc-windows-msvc.zip"
          gh release download "v${env:ANVIL_VERSION}" --repo BrokkAi/anvil --pattern $asset --pattern "$asset.sha256"
          $expected = (Get-Content "$asset.sha256").Split()[0].ToLower()
          $actual = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          if ($actual -ne $expected) { throw "Anvil checksum mismatch" }
          Expand-Archive -Path $asset -DestinationPath anvil-dist
          Copy-Item (Get-ChildItem anvil-dist -Recurse -Filter anvil.exe | Select-Object -First 1).FullName -Destination "target\x86_64-pc-windows-msvc\release\anvil.exe"

      - name: Package archive
        shell: pwsh
        run: |
          $name = "brokk-mjolnir-${env:GITHUB_REF_NAME}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\mj.exe" -Destination $name
          Copy-Item "target\x86_64-pc-windows-msvc\release\mj-voice-worker.exe" -Destination $name
          Copy-Item "target\x86_64-pc-windows-msvc\release\anvil.exe" -Destination $name
          Copy-Item "README.md" -Destination $name
          Copy-Item "LICENSE" -Destination $name
          New-Item -ItemType Directory -Path "$name\licenses" | Out-Null
          $legalFiles = @("licenses\SOURCE.md", "licenses\OFL-1.1.md", "licenses\THIRD_PARTY_LICENSES.html", "licenses\SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt")
          Copy-Item $legalFiles -Destination "$name\licenses"
          Copy-Item "licenses\native" -Destination "$name\licenses" -Recurse
          Copy-Item "licenses\anvil-v${env:ANVIL_VERSION}" -Destination "$name\anvil-licenses" -Recurse
          Compress-Archive -Path $name -DestinationPath "$name.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$name.zip").Hash.ToLower()
          "$hash  $name.zip" | Set-Content -Path "$name.zip.sha256" -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: x86_64-pc-windows-msvc
          path: |
            brokk-mjolnir-*.zip
            brokk-mjolnir-*.zip.sha256
          if-no-files-found: error

  build-macos:
    name: Build macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64 binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Build x86_64 voice worker
        run: cargo build --release --locked -p brokk-mj-voice-worker --target x86_64-apple-darwin

      - name: Build aarch64 binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Build aarch64 voice worker
        run: cargo build --release --locked -p brokk-mj-voice-worker --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/mj \
            target/aarch64-apple-darwin/release/mj \
            -output target/universal-apple-darwin/release/mj
          lipo -info target/universal-apple-darwin/release/mj
          lipo -create \
            target/x86_64-apple-darwin/release/mj-voice-worker \
            target/aarch64-apple-darwin/release/mj-voice-worker \
            -output target/universal-apple-darwin/release/mj-voice-worker
          lipo -info target/universal-apple-darwin/release/mj-voice-worker

      - name: Download pinned Anvil
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="brokk-anvil-v${ANVIL_VERSION}-universal-apple-darwin.zip"
          gh release download "v${ANVIL_VERSION}" --repo BrokkAi/anvil --pattern "$asset" --pattern "$asset.sha256"
          shasum -a 256 -c "$asset.sha256"
          unzip -j "$asset" '*/anvil' -d target/universal-apple-darwin/release

      - name: Package archive
        run: |
          name="brokk-mjolnir-${GITHUB_REF_NAME}-universal-apple-darwin"
          mkdir "$name"
          cp target/universal-apple-darwin/release/mj "$name/"
          cp target/universal-apple-darwin/release/mj-voice-worker "$name/"
          cp target/universal-apple-darwin/release/anvil "$name/"
          cp README.md LICENSE "$name/"
          mkdir "$name/licenses"
          cp licenses/SOURCE.md licenses/OFL-1.1.md licenses/THIRD_PARTY_LICENSES.html licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "$name/licenses/"
          cp -R licenses/native "$name/licenses/"
          cp -R "licenses/anvil-v${ANVIL_VERSION}" "$name/anvil-licenses"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: universal-apple-darwin
          path: |
            brokk-mjolnir-*.tar.gz
            brokk-mjolnir-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-linux, build-linux-arm64, build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/brokk-mjolnir-*.tar.gz
            artifacts/brokk-mjolnir-*.tar.gz.sha256
            artifacts/brokk-mjolnir-*.zip
            artifacts/brokk-mjolnir-*.zip.sha256

      - name: Announce release on Discord
        continue-on-error: true
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: bash scripts/announce-discord-release.sh
