name: CI

on:
  push:
    branches: [ 'master', 'ci/**' ]
  pull_request: {}

jobs:
  licenses:
    name: Dependency licenses
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install pinned license tools
      run: |
        cargo install --locked cargo-about --version 0.9.1 --features cli
        cargo install --locked cargo-deny --version 0.20.2

    - name: Fetch locked dependencies
      run: cargo fetch --locked

    - name: Check dependency license policy
      run: cargo deny --workspace --config licenses/deny.toml --locked check licenses

    - name: Check shipped notice reports
      run: |
        cargo about generate --workspace --offline --config licenses/about.toml --locked --fail licenses/about.hbs -o /tmp/THIRD_PARTY_LICENSES.html
        diff -u licenses/THIRD_PARTY_LICENSES.html /tmp/THIRD_PARTY_LICENSES.html
        node scripts/generate-supplemental-third-party-notices.mjs /tmp/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt
        diff -u licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt /tmp/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt

    - name: Check crate package license files
      run: |
        diff -u LICENSE voice-worker/LICENSE
        cargo package --locked --allow-dirty --list -p brokk-mjolnir > /tmp/mjolnir-package-files.txt
        cargo package --locked --allow-dirty --list -p brokk-mj-voice-worker > /tmp/voice-worker-package-files.txt
        grep -Fx LICENSE /tmp/mjolnir-package-files.txt
        grep -Fx licenses/THIRD_PARTY_LICENSES.html /tmp/mjolnir-package-files.txt
        grep -Fx licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt /tmp/mjolnir-package-files.txt
        grep -Fx licenses/anvil-v0.22.0/SOURCE.md /tmp/mjolnir-package-files.txt
        grep -Fx LICENSE /tmp/voice-worker-package-files.txt

  mjolnir:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      id: toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install Linux audio dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends --assume-yes libasound2-dev

    - name: Cache cargo registry and build
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-mjolnir-cargo-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-mjolnir-cargo-${{ steps.toolchain.outputs.cachekey }}-
          ${{ runner.os }}-mjolnir-cargo-

    - name: Check Rust formatting
      run: cargo fmt --check

    - name: Run Clippy lints
      run: cargo clippy --all-targets -- -D warnings

    - name: Build mjolnir
      run: cargo build --release

    - name: Run tests
      run: cargo test

  voice-worker:
    name: Voice worker (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Install Linux audio dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends --assume-yes libasound2-dev

    - name: Check voice worker
      run: cargo clippy -p brokk-mj-voice-worker --all-targets -- -D warnings

    - name: Test voice worker
      run: cargo test -p brokk-mj-voice-worker

  android:
    name: Android aarch64-linux-android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27d

    - name: Export Android NDK toolchain
      shell: bash
      run: |
        ndk_path='${{ steps.setup-ndk.outputs.ndk-path }}'
        echo "ANDROID_NDK_HOME=$ndk_path" >> "$GITHUB_ENV"
        echo "ANDROID_NDK_ROOT=$ndk_path" >> "$GITHUB_ENV"
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
        echo "CC_aarch64_linux_android=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
        echo "AR_aarch64_linux_android=$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"

    - name: Check Android target
      run: cargo check --locked --target aarch64-linux-android
