name: Feature request
description: Suggest a capability or workflow Mjolnir could support. A detailed design is not required.
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Mjolnir. Describe the use case at whatever level of detail you have; you do not need to propose an implementation.

  - type: textarea
    id: use-case
    attributes:
      label: What would you like Mjolnir to help you do?
      description: Describe the problem, workflow, or capability that would be useful to you.
      placeholder: I would like Mjolnir to...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Optionally share examples, possible approaches, relevant terminals, ACP adapters, providers, or related projects.
