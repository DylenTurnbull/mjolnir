<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Mjolnir social card</title>
  <desc id="description">Mjolnir, a native Rust terminal interface for coordinating a council of coding agents, illustrated with a fixed-grid ASCII hammer.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0910"/>
      <stop offset="0.56" stop-color="#08070c"/>
      <stop offset="1" stop-color="#050509"/>
    </linearGradient>
    <radialGradient id="hammerGlow" cx="50%" cy="46%" r="58%">
      <stop offset="0" stop-color="#985cff" stop-opacity="0.24"/>
      <stop offset="0.62" stop-color="#7b3fe4" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7b3fe4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1c1728" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.52"/>
  <rect x="1" y="1" width="1198" height="628" rx="16" fill="none" stroke="#30273e" stroke-width="2"/>
  <path d="M0 112H1200" stroke="#211a2b"/>

  <g transform="translate(58 48)">
    <rect x="0" y="3" width="42" height="14" rx="2" fill="#9a63ff"/>
    <rect x="17" y="17" width="8" height="22" fill="#eee8ff"/>
    <path d="M4 7H38" stroke="#d9c7ff" stroke-width="2" opacity="0.7"/>
    <text x="60" y="25" fill="#f5f1ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="800" letter-spacing="4">MJOLNIR</text>
    <path d="M226 2V30" stroke="#514361"/>
    <text x="246" y="23" fill="#8d819c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="3">TERMINAL COUNCIL</text>
  </g>

  <g transform="translate(58 206)">
    <text fill="#f6f2ff" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="72" font-weight="800" letter-spacing="1">
      <tspan x="0" y="0">ONE TERMINAL.</tspan>
      <tspan x="0" y="78">A COUNCIL OF</tspan>
      <tspan x="0" y="156">AGENTS.</tspan>
    </text>
    <text x="2" y="208" fill="#b5aabd" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      Native Rust TUI · Model-first agents · One shared terminal
    </text>
  </g>

