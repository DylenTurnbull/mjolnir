[package]
name = "brokk-mjolnir"
version = "0.3.5"
edition = "2024"
description = "Forge-grade terminal client for any Agent Client Protocol (ACP) server"
license = "GPL-3.0"
repository = "https://github.com/BrokkAi/mjolnir"
publish = true

[[bin]]
name = "mj"
path = "src/main.rs"

[dependencies]
agent-client-protocol = { version = "0.12", features = ["unstable_session_usage"] }
arboard = "3.4"
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
crossterm = { version = "0.29", features = ["event-stream"] }
dirs = "6"
flate2 = "1"
futures = "0.3"
libc = "0.2"
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shell-words = "1"
tar = "0.4"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat", "rt"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
zip = { version = "2", default-features = false, features = ["deflate"] }

[dev-dependencies]
tempfile = "3"
