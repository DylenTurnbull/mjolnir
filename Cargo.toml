[package]
name = "brokk-mjolnir"
version = "0.4.5"
edition = "2024"
description = "Forge-grade terminal client for any Agent Client Protocol (ACP) server"
license = "GPL-3.0"
repository = "https://github.com/BrokkAi/mjolnir"
publish = true

[[bin]]
name = "mj"
path = "src/main.rs"

[dependencies]
agent-client-protocol = { version = "0.12", features = ["unstable_session_model", "unstable_session_usage"] }
anyhow = "1"
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
crossterm = { version = "0.29", features = ["event-stream"] }
dirs = "6"
flate2 = "1"
futures = "0.3"
getrandom = "0.3"
image = { version = "0.25", default-features = false, features = ["gif", "jpeg", "png", "webp"] }
libc = "0.2"
ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
rcgen = { version = "0.13", features = ["pem", "x509-parser"] }
rustls = "0.23"
rustls-pki-types = "1"
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
shell-words = "1"
tar = "0.4"
tokio = { version = "1", features = ["full"] }
tokio-rustls = "0.26"
tokio-util = { version = "0.7", features = ["compat", "rt"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
zip = { version = "2", default-features = false, features = ["deflate"] }
unicode-width = "0.2.2"

[dev-dependencies]
tempfile = "3"

[target.'cfg(not(target_os = "android"))'.dependencies]
arboard = "3.4"
